<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
}

.hidden { display: none; }

#authScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px;
  border: none;
  background: #ff6b9a;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

header {
  background: #ff6b9a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.container {
  padding: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

/* LIST */
.list {
  display: flex;
  flex-direction: column;
}

.post {
  background: white;
  padding: 10px;
  border-radius: 12px;
  display: flex;
  gap: 10px;
}

.post img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.side {
  width: 200px;
  background: white;
  padding: 10px;
  border-left: 1px solid #ddd;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h3>Оберіть роль</h3>

    <button onclick="enterGuest()">👤 Гість</button>
    <button onclick="showAdminLogin()">🔐 Адмін</button>

    <div id="adminLogin" class="hidden">
      <input id="login" placeholder="Логін">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="loginAdmin()">Увійти</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  🍬 Солодкий ринок
  <div>
    <button onclick="logout()">Вийти</button>
    <button onclick="toggleView()">🔘 Вид</button>
  </div>
</header>

<div style="display:flex;">

<div style="flex:1; padding:15px;">

<!-- CONTROLS -->
<div class="controls">
  <input id="search" placeholder="🔎 Пошук...">

  <select id="sort">
    <option value="">Сортування</option>
    <option value="asc">Ціна ↑</option>
    <option value="desc">Ціна ↓</option>
  </select>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
  <h3>Адмін панель</h3>

  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">
  <input type="file" id="image">

  <button onclick="addPost()">Додати</button>
</div>

<div id="posts" class="grid"></div>

</div>

<div class="side">
  <h3 id="roleTitle"></h3>
  <p id="roleInfo"></p>

  <button onclick="enterGuest()">Гість</button>
  <button onclick="showAdminLogin()">Адмін</button>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 Firebase config */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* DOM */
const authScreen = document.getElementById("authScreen");
const appDiv = document.getElementById("app");
const adminPanel = document.getElementById("adminPanel");
const postsDiv = document.getElementById("posts");

let isAdmin = false;
let postsData = [];
let viewMode = "grid";

/* AUTH */
window.onload = () => {
  const role = localStorage.getItem("role");

  if (role === "admin") {
    isAdmin = true;
    startApp();
  } else if (role === "guest") {
    isAdmin = false;
    startApp();
  } else {
    authScreen.classList.remove("hidden");
  }
};

function enterGuest() {
  isAdmin = false;
  localStorage.setItem("role", "guest");
  startApp();
}

function showAdminLogin() {
  document.getElementById("adminLogin").classList.remove("hidden");
}

function loginAdmin() {
  const l = login.value;
  const p = password.value;

  if (l === "admin" && p === "1234") {
    isAdmin = true;
    localStorage.setItem("role", "admin");
    startApp();
  } else {
    alert("❌ Невірний логін");
  }
}

function startApp() {
  authScreen.classList.add("hidden");
  appDiv.classList.remove("hidden");

  adminPanel.classList.toggle("hidden", !isAdmin);

  document.getElementById("roleTitle").innerText = isAdmin ? "Адмін" : "Гість";
  document.getElementById("roleInfo").innerText = isAdmin ? "Повний доступ" : "Перегляд";

  loadPosts();
}

function logout() {
  localStorage.removeItem("role");
  location.reload();
}

/* LOAD */
async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  postsData = [];

  snap.forEach(d => {
    postsData.push({ id: d.id, ...d.data() });
  });

  renderPosts();
}

/* RENDER */
function renderPosts() {
  let data = [...postsData];

  const searchVal = document.getElementById("search").value.toLowerCase();
  const sortVal = document.getElementById("sort").value;

  if (searchVal) {
    data = data.filter(p =>
      p.title.toLowerCase().includes(searchVal)
    );
  }

  if (sortVal === "asc") {
    data.sort((a,b)=>a.price-b.price);
  }

  if (sortVal === "desc") {
    data.sort((a,b)=>b.price-a.price);
  }

  postsDiv.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>${p.price} грн</b>
        <div>
          ${isAdmin ? `
          <button onclick="editPost('${p.id}')">✏️</button>
          <button onclick="deletePost('${p.id}')">❌</button>
          ` : ""}
        </div>
      </div>
    `;

    postsDiv.appendChild(div);
  });
}

/* ADD */
window.addPost = async () => {
  const file = image.files[0];
  let img = "";

  if (file) {
    const reader = new FileReader();
    reader.onload = async e => {
      img = e.target.result;

      await addDoc(collection(db,"posts"), {
        title: title.value,
        desc: desc.value,
        price: Number(price.value),
        image: img
      });

      loadPosts();
    };
    reader.readAsDataURL(file);
  }
};

/* DELETE */
window.deletePost = async (id) => {
  if (!confirm("Видалити?")) return;
  await deleteDoc(doc(db,"posts",id));
  loadPosts();
};

/* EDIT */
window.editPost = async (id) => {
  const p = postsData.find(x => x.id === id);

  const t = prompt("Назва", p.title);
  const d = prompt("Опис", p.desc);
  const pr = prompt("Ціна", p.price);

  if (!t || !pr) return;

  await updateDoc(doc(db,"posts",id), {
    title: t,
    desc: d,
    price: Number(pr)
  });

  loadPosts();
};

/* VIEW TOGGLE */
window.toggleView = () => {
  viewMode = viewMode === "grid" ? "list" : "grid";
  postsDiv.className = viewMode;
};

/* EVENTS */
document.getElementById("search").oninput = renderPosts;
document.getElementById("sort").onchange = renderPosts;

/* GLOBAL */
window.enterGuest = enterGuest;
window.showAdminLogin = showAdminLogin;
window.loginAdmin = loginAdmin;
window.logout = logout;

</script>

</body>
</html>
