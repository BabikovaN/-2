<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;
let posts = [];

// 🔄 ЗАВАНТАЖИТИ ТОВАРИ З FIREBASE
async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  posts = [];

  querySnapshot.forEach((docSnap) => {
    posts.push({ id: docSnap.id, ...docSnap.data() });
  });

  renderPosts();
}

// ГІСТЬ
function enterGuest() {
  isAdmin = false;

  document.getElementById("roleSelect").style.display = "none";
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("searchBox").style.display = "block";

  document.getElementById("switchBtn").innerText = "Увійти як адмін";

  loadPosts();
}

// ЛОГІН
function loginAdmin() {
  const login = document.getElementById("login").value;
  const password = document.getElementById("password").value;

  if (login === "Nastuhsa" && password === "Babikovf") {
    isAdmin = true;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("searchBox").style.display = "block";

    document.getElementById("switchBtn").innerText = "Вийти в гість";

    loadPosts();
  } else {
    alert("Неправильний логін або пароль");
  }
}

// ПЕРЕМИКАННЯ
function switchMode() {
  if (isAdmin) {
    enterGuest();
  } else {
    showLogin();
  }
}

// ПОКАЗ ЛОГІН
function showLogin() {
  document.getElementById("roleSelect").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
}

// РЕНДЕР
function renderPosts() {
  const container = document.getElementById("posts");
  const search = document.getElementById("search")?.value?.toLowerCase() || "";

  container.innerHTML = "";

  posts
    .filter(p => p.title.toLowerCase().includes(search))
    .forEach((p) => {
      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>${p.price} грн</b><br>
        ${p.image ? `<img src="${p.image}">` : ""}
        ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌ Видалити</button>` : ""}
      `;

      container.appendChild(div);
    });
}

// ДОДАТИ В FIREBASE
async function addPost() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  if (!title || !price) {
    alert("Заповни назву і ціну");
    return;
  }

  let imageBase64 = null;

  if (file) {
    const reader = new FileReader();
    reader.onload = async function(e) {
      imageBase64 = e.target.result;

      await addDoc(collection(db, "posts"), {
        title,
        desc,
        price,
        image: imageBase64
      });

      loadPosts();
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), {
      title,
      desc,
      price,
      image: null
    });

    loadPosts();
  }
}

// ВИДАЛИТИ З FIREBASE
async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
  loadPosts();
}

// зробити функції доступними глобально
window.enterGuest = enterGuest;
window.showLogin = showLogin;
window.loginAdmin = loginAdmin;
window.switchMode = switchMode;
window.addPost = addPost;
window.deletePost = deletePost;

</script>
