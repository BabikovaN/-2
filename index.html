<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
:root {
  --bg: #f2f4f8;
  --card: #ffffff;
  --text: #222;
  --accent: #ff6b9a;
}

body.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #f1f1f1;
  --accent: #ff6b9a;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* Header */
header {
  background: linear-gradient(135deg, #ff6b9a, #ff8fb3);
  color: white;
  padding: 15px;
  text-align: center;
}

/* Container */
.container {
  padding: 15px;
  max-width: 900px;
  margin: auto;
}

/* Buttons */
button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  opacity: 0.9;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Cards */
.post {
  background: var(--card);
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.post img {
  max-width: 100%;
  border-radius: 10px;
  margin-top: 8px;
}

/* Layout fix for mobile */
@media (max-width: 600px) {
  header {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<header>
  🍬 Солодкий ринок
  <br>
  <button onclick="toggleTheme()">🌙 / ☀️</button>
  <button onclick="switchMode()">Режим</button>
</header>

<div class="container">

<div id="roleSelect">
  <button onclick="enterGuest()">Гість</button>
  <button onclick="showLogin()">Адмін</button>
</div>

<div id="loginBox" style="display:none;">
  <h3>Вхід адміна</h3>
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div id="adminPanel" style="display:none;">
  <h3>Додати товар</h3>
  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">
  <input type="file" id="image">
  <button onclick="addPost()">➕ Додати</button>
</div>

<input id="search" placeholder="Пошук..." oninput="renderPosts()">

<div id="posts"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;
let posts = [];

/* Завантаження */
async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  posts = [];

  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  posts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  renderPosts();
}

/* Гість */
function enterGuest() {
  isAdmin = false;
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "none";
  loadPosts();
}

/* Логін */
function showLogin() {
  document.getElementById("loginBox").style.display = "block";
}

function loginAdmin() {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  if (l === "Nastuhsa" && p === "Babikovf") {
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("loginBox").style.display = "none";
    loadPosts();
  } else {
    alert("Невірно");
  }
}

/* Тема день/ніч */
function toggleTheme() {
  document.body.classList.toggle("dark");
}

/* Рендер */
function renderPosts() {
  const container = document.getElementById("posts");
  const search = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  posts
    .filter(p => (p.title || "").toLowerCase().includes(search))
    .forEach(p => {

      const date = p.createdAt ? new Date(p.createdAt).toLocaleString() : "";

      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <h3>${p.title}</h3>
        <p>${p.desc || ""}</p>
        <b>💰 ${p.price} грн</b><br>
        <small>🕒 ${date}</small><br>
        ${p.image ? `<img src="${p.image}">` : ""}
        ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌ Видалити</button>` : ""}
      `;

      container.appendChild(div);
    });
}

/* Додати */
async function addPost() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  if (!title || !price) {
    alert("Заповни назву і ціну");
    return;
  }

  let image = null;

  const save = async () => {
    await addDoc(collection(db, "posts"), {
      title,
      desc,
      price,
      image,
      createdAt: Date.now()
    });

    loadPosts();
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      image = e.target.result;
      save();
    };
    reader.readAsDataURL(file);
  } else {
    save();
  }
}

/* Видалення */
async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
  loadPosts();
}

/* глобальні */
window.enterGuest = enterGuest;
window.showLogin = showLogin;
window.loginAdmin = loginAdmin;
window.addPost = addPost;
window.deletePost = deletePost;
window.toggleTheme = toggleTheme;

loadPosts();
</script>

</body>
</html>
