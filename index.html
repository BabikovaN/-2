<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
:root {
  --bg: #eaf6ff;
  --card: white;
  --text: #333;
}

body.dark {
  --bg: #1e2a36;
  --card: #2a3a4a;
  --text: #fff;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

header {
  padding: 10px;
  display:flex;
  justify-content:space-between;
  background:#9fd3ff;
}

.controls {
  padding:10px;
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

input, select, button {
  padding:8px;
  border-radius:8px;
  border:none;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}

.list {
  display:block;
  padding:10px;
}

.card {
  background: var(--card);
  padding:10px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

#modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#modal img {
  max-width:90%;
  max-height:90%;
}

#loader {
  display:none;
}
</style>
</head>

<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button id="adminBtn">🔐 Admin</button>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="logout()">🚪</button>
  </div>
</header>

<!-- LOGIN -->
<div id="loginBox" style="display:none; padding:10px;">
  <h3>Вхід в адмін</h3>
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div class="controls">
  <input id="search" placeholder="Пошук...">
  <select id="sort">
    <option value="">Сортування</option>
    <option value="asc">Ціна ↑</option>
    <option value="desc">Ціна ↓</option>
  </select>

  <button onclick="toggleView()">🔘 Grid/List</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="padding:10px; display:none;">
  <h3>Адмін</h3>

  <input id="title" placeholder="Назва">
  <input id="price" placeholder="Ціна">
  <textarea id="desc" placeholder="Опис"></textarea>

  <input type="file" id="images" multiple>

  <input id="inst" placeholder="Instagram">
  <input id="tg" placeholder="Telegram">
  <input id="phone" placeholder="Phone">
  <input id="email" placeholder="Email">

  <button id="addBtn">Додати</button>
  <div id="loader">⏳ Завантаження...</div>
</div>

<div id="posts" class="grid"></div>

<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let posts = [];
let editId = null;
let isAdmin = localStorage.getItem("admin")==="true";
let view = "grid";

/* ELEMENTS */
const postsDiv = document.getElementById("posts");
const loader = document.getElementById("loader");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");
const adminBtn = document.getElementById("adminBtn");

/* ADMIN BUTTON */
adminBtn.onclick = () => {
  loginBox.style.display = "block";
};

/* LOGIN */
window.loginAdmin = () => {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  if (l === "admin" && p === "1234") {
    localStorage.setItem("admin","true");
    isAdmin = true;
    adminPanel.style.display = "block";
    loginBox.style.display = "none";
    render();
  } else {
    alert("❌ Невірний логін");
  }
};

/* LOGOUT */
window.logout = () => {
  localStorage.removeItem("admin");
  isAdmin = false;
  adminPanel.style.display = "none";
  render();
};

/* INIT */
window.onload = () => {
  if (localStorage.getItem("admin") === "true") {
    isAdmin = true;
    adminPanel.style.display = "block";
  } else {
    adminPanel.style.display = "none";
  }
  load();
};

/* LOAD */
async function load() {
  const snap = await getDocs(collection(db,"posts"));
  posts = [];
  snap.forEach(d=>posts.push({id:d.id,...d.data()}));
  render();
}

/* RENDER */
function render() {
  postsDiv.className = view;

  postsDiv.innerHTML = "";

  posts.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    const img = p.images?.[0] || "";

    div.innerHTML=`
      ${img?`<img src="${img}" onclick="openModal('${img}')">`:""}
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>

      <div style="font-size:12px;">
        ${p.inst||""}<br>
        ${p.tg||""}<br>
        ${p.phone||""}<br>
        ${p.email||""}
      </div>

      ${isAdmin?`
        <button onclick="editPost('${p.id}')">✏️</button>
        <button onclick="del('${p.id}')">❌</button>
      `:""}
    `;

    postsDiv.appendChild(div);
  });
}

/* ADD */
document.getElementById("addBtn").onclick = async ()=>{

  const files = document.getElementById("images").files;

  if(!title.value || !price.value){
    alert("Заповни поля");
    return;
  }

  loader.style.display="block";

  let images = [];

  for(let f of files){
    const base64 = await toBase64(f);
    images.push(base64);
  }

  const data = {
    title:title.value,
    desc:desc.value,
    price:Number(price.value),
    images,
    inst:inst.value,
    tg:tg.value,
    phone:phone.value,
    email:email.value
  };

  if(editId){
    await updateDoc(doc(db,"posts",editId), data);
    editId=null;
  } else {
    await addDoc(collection(db,"posts"), data);
  }

  loader.style.display="none";
  clear();
  load();
};

/* EDIT */
window.editPost = (id)=>{
  const p = posts.find(x=>x.id===id);

  title.value=p.title;
  desc.value=p.desc;
  price.value=p.price;

  inst.value=p.inst||"";
  tg.value=p.tg||"";
  phone.value=p.phone||"";
  email.value=p.email||"";

  editId=id;
};

/* DELETE */
window.del = async(id)=>{
  await deleteDoc(doc(db,"posts",id));
  load();
};

/* MODAL */
window.openModal = (src)=>{
  modal.style.display="flex";
  modalImg.src=src;
};

window.closeModal = ()=>{
  modal.style.display="none";
};

/* UTILS */
function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

function clear(){
  title.value="";
  desc.value="";
  price.value="";
}

/* VIEW */
window.toggleView=()=>{
  view = view==="grid"?"list":"grid";
  render();
};

/* THEME */
window.toggleTheme=()=>{
  document.body.classList.toggle("dark");
};

/* SEARCH + SORT */
search.oninput=render;
sort.onchange=render;

load();
</script>

</body>
</html>
