<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
:root {
  --bg:#f4f6f9;
  --card:#fff;
  --text:#111;
  --accent:#4da3ff;
}

body.dark {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#eee;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  padding:12px;
  display:flex;
  justify-content:space-between;
  background:var(--accent);
  color:white;
}

/* BUTTONS */
button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:var(--card);
  padding:10px;
  border-radius:12px;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* ADMIN */
#adminPanel {
  display:none;
  padding:15px;
  background:var(--card);
  margin:10px;
  border-radius:10px;
}

/* LOGIN */
#loginBox {
  display:none;
  padding:10px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#modal img {
  max-width:95%;
  max-height:80%;
}

.modal-controls {
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="showLogin()">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div id="loginBox">
  <input id="login" placeholder="login"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button onclick="loginAdmin()">Login</button>
</div>

<div id="adminPanel">
  <h3>Адмінка</h3>

  <input id="title" placeholder="Назва"><br><br>
  <input id="price" placeholder="Ціна"><br><br>
  <textarea id="desc" placeholder="Опис"></textarea><br><br>

  <input type="file" id="images" multiple><br><br>

  <input id="inst" placeholder="Instagram"><br>
  <input id="tg" placeholder="Telegram"><br>
  <input id="phone" placeholder="Phone"><br>
  <input id="email" placeholder="Email"><br><br>

  <button id="addBtn">Зберегти товар</button>
</div>

<div id="posts" class="grid"></div>

<div id="modal">
  <img id="modalImg">
  <div class="modal-controls">
    <button onclick="prevImg()">⬅</button>
    <button onclick="nextImg()">➡</button>
    <button onclick="closeModal()">✖</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
  storageBucket: "sweet-market-9c94e.appspot.com",
  messagingSenderId: "583966719717",
  appId: "1:583966719717:web:f16675f96d95fa83b19e0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DOM */
const postsDiv = document.getElementById("posts");
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const price = document.getElementById("price");
const images = document.getElementById("images");
const inst = document.getElementById("inst");
const tg = document.getElementById("tg");
const phone = document.getElementById("phone");
const email = document.getElementById("email");

const login = document.getElementById("login");
const password = document.getElementById("password");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

/* STATE */
let posts = [];
let isAdmin = false;
let editId = null;

let currentImages = [];
let currentIndex = 0;

/* LOAD */
onSnapshot(collection(db,"posts"), (snapshot)=>{
  posts = snapshot.docs.map(d=>({id:d.id, ...d.data()}));
  render();
});

/* ADD / EDIT */
document.getElementById("addBtn").onclick = async ()=>{

  const files = images.files;
  const imgs = [];

  for(let file of files){
    const base64 = await new Promise(res=>{
      const reader = new FileReader();
      reader.onload = ()=>res(reader.result);
      reader.readAsDataURL(file);
    });
    imgs.push(base64);
  }

  const data = {
    title: title.value,
    desc: desc.value,
    price: Number(price.value)||0,
    images: imgs,
    inst: inst.value,
    tg: tg.value,
    phone: phone.value,
    email: email.value
  };

  if(editId){
    await updateDoc(doc(db,"posts",editId), data);
    editId = null;
  } else {
    await addDoc(collection(db,"posts"), data);
  }

  title.value = desc.value = price.value = inst.value = tg.value = phone.value = email.value = "";
  images.value = "";
};

/* RENDER */
function render(){
  postsDiv.innerHTML="";

  posts.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${p.images?.[0] ? `<img src="${p.images[0]}" onclick="openModal(${JSON.stringify(p.images)})">` : ""}
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b><br><br>

      ${isAdmin ? `
        <button onclick="editPost('${p.id}')">Edit</button>
        <button onclick="deletePost('${p.id}')">Delete</button>
      ` : ""}
    `;

    postsDiv.appendChild(div);
  });
}

/* ADMIN */
window.loginAdmin = ()=>{
  if(login.value==="admin" && password.value==="1234"){
    isAdmin=true;
    adminPanel.style.display="block";
    loginBox.style.display="none";
  } else alert("Wrong");
};

window.logout = ()=>{
  isAdmin=false;
  adminPanel.style.display="none";
};

/* EDIT / DELETE */
window.editPost = (id)=>{
  const p = posts.find(x=>x.id===id);
  if(!p) return;

  title.value=p.title;
  desc.value=p.desc;
  price.value=p.price;
  inst.value=p.inst||"";
  tg.value=p.tg||"";
  phone.value=p.phone||"";
  email.value=p.email||"";

  editId=id;
};

window.deletePost = async (id)=>{
  if(confirm("Delete?")){
    await deleteDoc(doc(db,"posts",id));
  }
};

/* MODAL */
window.openModal = (imgs)=>{
  currentImages = imgs;
  currentIndex = 0;
  modal.style.display="flex";
  modalImg.src = currentImages[currentIndex];
};

window.nextImg = ()=>{
  if(!currentImages.length) return;
  currentIndex = (currentIndex + 1) % currentImages.length;
  modalImg.src = currentImages[currentIndex];
};

window.prevImg = ()=>{
  if(!currentImages.length) return;
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
  modalImg.src = currentImages[currentIndex];
};

window.closeModal = ()=>{
  modal.style.display="none";
};

/* THEME */
window.toggleTheme = ()=>{
  document.body.classList.toggle("dark");
};

/* UI */
window.showLogin = ()=>{
  loginBox.style.display="block";
};

</script>

</body>
</html>
