<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#ff6b9a; color:white; padding:10px; text-align:center; }
.container { padding:15px; }
.post { background:white; padding:10px; margin:10px 0; border-radius:10px; }
img { max-width:150px; display:block; margin-top:5px; }
button { margin-top:5px; }
input, textarea { display:block; margin:5px 0; padding:8px; width:100%; }
</style>
</head>

<body>

<header>
  <h2>🍬 Солодкий ринок</h2>
  <button onclick="switchMode()">Перемкнути режим</button>
</header>

<div class="container">

<div id="roleSelect">
  <button onclick="enterGuest()">Увійти як гість</button>
  <button onclick="showLogin()">Адмін</button>
</div>

<div id="loginBox" style="display:none;">
  <h3>Вхід адміна</h3>
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div id="adminPanel" style="display:none;">
  <h3>Додати товар</h3>
  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">
  <input type="file" id="image">
  <button onclick="addPost()">➕ Додати</button>
</div>

<input id="search" placeholder="Пошук..." oninput="renderPosts()">

<div id="posts"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;
let posts = [];

async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  posts = [];
  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));
  renderPosts();
}

function enterGuest() {
  isAdmin = false;
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "none";
  loadPosts();
}

function showLogin() {
  document.getElementById("loginBox").style.display = "block";
}

function loginAdmin() {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  if (l === "Nastuhsa" && p === "Babikovf") {
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("loginBox").style.display = "none";
    loadPosts();
  } else {
    alert("Невірно");
  }
}

function renderPosts() {
  const container = document.getElementById("posts");
  const search = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  posts.filter(p => (p.title || "").toLowerCase().includes(search))
  .forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.desc || ""}</p>
      <b>${p.price} грн</b><br>
      ${p.image ? `<img src="${p.image}">` : ""}
      ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌ Видалити</button>` : ""}
    `;

    container.appendChild(div);
  });
}

async function addPost() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  let image = null;

  if (file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      image = e.target.result;

      await addDoc(collection(db, "posts"), { title, desc, price, image });
      loadPosts();
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), { title, desc, price, image });
    loadPosts();
  }
}

async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
  loadPosts();
}

window.enterGuest = enterGuest;
window.showLogin = showLogin;
window.loginAdmin = loginAdmin;
window.addPost = addPost;
window.deletePost = deletePost;

loadPosts();
</script>

</body>
</html>
