<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
}

.hidden { display: none; }

#authScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 280px;
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px;
  border: none;
  background: #ff6b9a;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

#app {
  display: flex;
}

.main { flex: 1; }

header {
  background: #ff6b9a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 15px;
}

.post {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 12px;
  display: flex;
  gap: 10px;
}

.post img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.side {
  width: 180px;
  background: white;
  border-left: 1px solid #ddd;
  padding: 10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h3>Оберіть роль</h3>

    <button onclick="enterGuest()">👤 Гість</button>
    <button onclick="showAdminLogin()">🔐 Адмін</button>

    <div id="adminLogin" class="hidden">
      <input id="login" placeholder="Логін">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="loginAdmin()">Увійти</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="main">
    <header>
      🍬 Солодкий ринок
      <button onclick="logout()">Вийти</button>
    </header>

    <div class="container">

      <div id="adminPanel" class="hidden">
        <h3>Адмін панель</h3>

        <input id="title" placeholder="Назва">
        <textarea id="desc" placeholder="Опис"></textarea>
        <input id="price" placeholder="Ціна">

        <input id="inst" placeholder="Instagram">
        <input id="tg" placeholder="Telegram">
        <input id="phone" placeholder="Телефон">
        <input id="email" placeholder="Email">

        <input type="file" id="image">

        <button onclick="addPost()">Додати</button>
      </div>

      <div id="posts"></div>

    </div>
  </div>

  <div class="side">
    <h3 id="roleTitle"></h3>
    <p id="roleInfo"></p>

    <button onclick="enterGuest()">Гість</button>
    <button onclick="showAdminLogin()">Адмін</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* FIX DOM ACCESS */
const authScreen = document.getElementById("authScreen");
const adminLogin = document.getElementById("adminLogin");
const appDiv = document.getElementById("app");
const adminPanel = document.getElementById("adminPanel");
const postsContainer = document.getElementById("posts");

let isAdmin = false;

/* AUTO LOGIN */
window.onload = () => {
  const role = localStorage.getItem("role");

  if (role === "admin") {
    isAdmin = true;
    startApp();
  } else if (role === "guest") {
    isAdmin = false;
    startApp();
  } else {
    authScreen.classList.remove("hidden");
  }
};

/* AUTH */
function enterGuest() {
  isAdmin = false;
  localStorage.setItem("role", "guest");
  startApp();
}

function showAdminLogin() {
  adminLogin.classList.remove("hidden");
}

function loginAdmin() {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  if (l === "Nastuhsa" && p === "Babikovf") {
    isAdmin = true;
    localStorage.setItem("role", "admin");
    startApp();
  } else {
    alert("❌ Невірний логін");
  }
}

function startApp() {
  authScreen.classList.add("hidden");
  appDiv.classList.remove("hidden");

  adminPanel.classList.toggle("hidden", !isAdmin);

  document.getElementById("roleTitle").innerText = isAdmin ? "Адмін" : "Гість";
  document.getElementById("roleInfo").innerText = isAdmin ? "Повний доступ" : "Перегляд";

  loadPosts();
}

function logout() {
  localStorage.removeItem("role");
  location.reload();
}

/* LOAD POSTS */
async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  postsContainer.innerHTML = "";

  snap.forEach(d => {
    const p = d.data();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>${p.price} грн</b>
      </div>
    `;

    postsContainer.appendChild(div);
  });
}

/* ADD POST */
async function addPost() {
  const file = document.getElementById("image").files[0];
  let imageUrl = "";

  if (file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      imageUrl = e.target.result;

      await addDoc(collection(db, "posts"), {
        title: title.value,
        desc: desc.value,
        price: price.value,
        image: imageUrl
      });

      loadPosts();
    };
    reader.readAsDataURL(file);
  }
}

/* GLOBAL EXPORT */
window.enterGuest = enterGuest;
window.showAdminLogin = showAdminLogin;
window.loginAdmin = loginAdmin;
window.logout = logout;
window.addPost = addPost;

</script>

</body>
</html>
