<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
}

.hidden { display: none; }

/* AUTH */
#authScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 280px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px;
  border: none;
  background: #ff6b9a;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* APP */
#app {
  display: flex;
}

.main {
  flex: 1;
}

header {
  background: #ff6b9a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 15px;
}

/* POSTS */
.post {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 12px;
  display: flex;
  gap: 10px;
}

.post img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

/* SIDE PANEL */
.side {
  width: 200px;
  background: white;
  border-left: 1px solid #ddd;
  padding: 10px;
}

.side h3 {
  margin-top: 0;
}
</style>
</head>

<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-box">
    <h3>Оберіть роль</h3>

    <button onclick="enterGuest()">👤 Гість</button>
    <button onclick="showAdminLogin()">🔐 Адмін</button>

    <div id="adminLogin" class="hidden">
      <input id="login" placeholder="Логін">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="loginAdmin()">Увійти</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="main">
    <header>
      🍬 Солодкий ринок
      <button onclick="logout()">Вийти</button>
    </header>

    <div class="container">

      <!-- ADMIN PANEL -->
      <div id="adminPanel" class="hidden">
        <h3>Адмін панель</h3>

        <input id="title" placeholder="Назва">
        <textarea id="desc" placeholder="Опис"></textarea>
        <input id="price" placeholder="Ціна">

        <input id="inst" placeholder="Instagram">
        <input id="tg" placeholder="Telegram">
        <input id="phone" placeholder="Телефон">
        <input id="email" placeholder="Email">

        <input type="file" id="image">

        <button onclick="addPost()">Додати</button>
      </div>

      <div id="posts"></div>

      <button onclick="loadMore()">Завантажити ще</button>

    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side">
    <h3 id="roleTitle"></h3>
    <p id="roleInfo"></p>

    <div id="switchPanel">
      <p>Змінити роль:</p>
      <button onclick="enterGuest()">Гість</button>
      <button onclick="showAdminLogin()">Адмін</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let isAdmin = false;
let lastDoc = null;

/* ===== AUTO LOGIN ===== */
window.onload = () => {
  const role = localStorage.getItem("role");

  if (role === "admin") {
    isAdmin = true;
    startApp();
  } else if (role === "guest") {
    isAdmin = false;
    startApp();
  } else {
    authScreen.classList.remove("hidden");
  }
};

/* ===== AUTH ===== */
function enterGuest() {
  isAdmin = false;
  localStorage.setItem("role", "guest");
  startApp();
}

function showAdminLogin() {
  adminLogin.classList.remove("hidden");
}

function loginAdmin() {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  if (l === "Nastuhsa" && p === "Babikovf") {
    isAdmin = true;
    localStorage.setItem("role", "admin");
    startApp();
  } else {
    alert("Невірно");
  }
}

function startApp() {
  authScreen.classList.add("hidden");
  app.classList.remove("hidden");

  adminPanel.classList.toggle("hidden", !isAdmin);

  roleTitle.innerText = isAdmin ? "Роль: Адмін" : "Роль: Гість";
  roleInfo.innerText = isAdmin ? "Повний доступ" : "Тільки перегляд";

  loadPosts(true);
}

function logout() {
  localStorage.removeItem("role");
  location.reload();
}

/* ===== POSTS ===== */
async function loadPosts(reset=false) {
  let q;

  if (reset) {
    posts.innerHTML = "";
    lastDoc = null;
    q = query(collection(db, "posts"), limit(5));
  } else {
    if (!lastDoc) return;
    q = query(collection(db, "posts"), startAfter(lastDoc), limit(5));
  }

  const snap = await getDocs(q);

  if (snap.docs.length > 0) {
    lastDoc = snap.docs[snap.docs.length - 1];
  }

  snap.forEach(doc => {
    renderPost(doc.data());
  });
}

function renderPost(p) {
  const div = document.createElement("div");
  div.className = "post";

  div.innerHTML = `
    ${p.image ? `<img loading="lazy" src="${p.image}">` : ""}

    <div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>

      <div>
        ${p.inst ? `<a href="${p.inst}" target="_blank">Instagram</a><br>` : ""}
        ${p.tg ? `<a href="${p.tg}" target="_blank">Telegram</a><br>` : ""}
        ${p.phone ? `<p>${p.phone}</p>` : ""}
        ${p.email ? `<p>${p.email}</p>` : ""}
      </div>
    </div>
  `;

  posts.appendChild(div);
}

/* ADD POST */
async function addPost() {
  const file = image.files[0];
  let imageUrl = "";

  if (file) {
    const storageRef = ref(storage, 'images/' + Date.now());
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db, "posts"), {
    title: title.value,
    desc: desc.value,
    price: price.value,
    inst: inst.value,
    tg: tg.value,
    phone: phone.value,
    email: email.value,
    image: imageUrl
  });

  loadPosts(true);
}

/* LOAD MORE */
function loadMore() {
  loadPosts(false);
}

/* GLOBAL */
window.enterGuest = enterGuest;
window.showAdminLogin = showAdminLogin;
window.loginAdmin = loginAdmin;
window.logout = logout;
window.addPost = addPost;
window.loadMore = loadMore;

</script>

</body>
</html>
