<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Солодкий маркет 🍩</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: linear-gradient(135deg, #ffe0f0, #fff5cc);
}

h1 { text-align: center; }

.top-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 8px 12px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  background: #ff6fa5;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
}

.post {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
}

.post img {
  width: 100%;
  max-width: 200px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🍩 Солодкий маркет</h1>

<button id="switchBtn" class="top-btn" onclick="switchMode()">Увійти як адмін</button>

<div id="roleSelect" class="box">
  <h3>Хто ви?</h3>
  <button onclick="enterGuest()">Гість</button>
  <button onclick="showLogin()">Адмін</button>
</div>

<div id="loginBox" class="box" style="display:none;">
  <h3>Вхід для адміна</h3>
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div id="searchBox" class="box" style="display:none;">
  <input id="search" placeholder="Пошук..." oninput="renderPosts()">
</div>

<div id="adminPanel" class="box" style="display:none;">
  <h3>Додати товар</h3>

  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">
  <input id="image" type="file">

  <button onclick="addPost()">Додати 🍬</button>
</div>

<div id="posts"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;
let posts = [];

// 🔄 LOAD DATA
async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  posts = [];

  querySnapshot.forEach((docSnap) => {
    posts.push({ id: docSnap.id, ...docSnap.data() });
  });

  renderPosts();
}

// 👤 GUEST
function enterGuest() {
  isAdmin = false;

  document.getElementById("roleSelect").style.display = "none";
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("searchBox").style.display = "block";

  document.getElementById("switchBtn").innerText = "Увійти як адмін";

  loadPosts();
}

// 🔐 LOGIN
function loginAdmin() {
  const login = document.getElementById("login").value;
  const password = document.getElementById("password").value;

  if (login === "Nastuhsa" && password === "Babikovf") {
    isAdmin = true;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("searchBox").style.display = "block";

    document.getElementById("switchBtn").innerText = "Вийти в гість";

    loadPosts();
  } else {
    alert("Неправильний логін або пароль");
  }
}

// 🔁 SWITCH
function switchMode() {
  if (isAdmin) {
    enterGuest();
  } else {
    showLogin();
  }
}

// 🔐 SHOW LOGIN
function showLogin() {
  document.getElementById("roleSelect").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
}

// 🧾 RENDER
function renderPosts() {
  const container = document.getElementById("posts");
  const search = document.getElementById("search")?.value?.toLowerCase() || "";

  container.innerHTML = "";

  posts
    .filter(p => p.title.toLowerCase().includes(search))
    .forEach((p) => {
      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>${p.price} грн</b><br>
        ${p.image ? `<img src="${p.image}">` : ""}
        ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌ Видалити</button>` : ""}
      `;

      container.appendChild(div);
    });
}

// ➕ ADD
async function addPost() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  if (!title || !price) {
    alert("Заповни назву і ціну");
    return;
  }

  let imageBase64 = null;

  if (file) {
    const reader = new FileReader();
    reader.onload = async function(e) {
      imageBase64 = e.target.result;

      await addDoc(collection(db, "posts"), {
        title,
        desc,
        price,
        image: imageBase64
      });

      loadPosts();
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), {
      title,
      desc,
      price,
      image: null
    });

    loadPosts();
  }
}

// ❌ DELETE
async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
  loadPosts();
}

// expose
window.enterGuest = enterGuest;
window.showLogin = showLogin;
window.loginAdmin = loginAdmin;
window.switchMode = switchMode;
window.addPost = addPost;
window.deletePost = deletePost;

// ✅ AUTO START
window.addEventListener("DOMContentLoaded", () => {
  loadPosts();
  enterGuest();
});

</script>

</body>
</html>
