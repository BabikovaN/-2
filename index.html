<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Market</title>
<style>
body{font-family:Arial;margin:0;padding:10px;}
.card{border:1px solid #ccc;padding:10px;margin:10px;border-radius:10px}
.card img{width:100%;max-height:200px;object-fit:cover;cursor:pointer}
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
#modal img{
  max-width:100%;
  max-height:100%;
  transition: transform 0.2s ease;
  touch-action:none;
}
button{margin:5px}
</style>
</head>
<body>

<h2>Sweet Market</h2>

<input id="title" placeholder="Назва">
<input id="price" placeholder="Ціна">
<input id="desc" placeholder="Опис">
<input type="file" id="images" multiple>
<button onclick="addProduct()">Додати</button>

<div id="list"></div>

<div id="modal">
  <button id="prevBtn" style="position:absolute;left:10px;top:50%;font-size:30px;">⬅️</button>
  <img id="modalImg">
  <button id="nextBtn" style="position:absolute;right:10px;top:50%;font-size:30px;">➡️</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function toBase64(file){
  return new Promise(res=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e=> img.src = e.target.result;
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const maxWidth=600;
      const scale=maxWidth/img.width;
      canvas.width=maxWidth;
      canvas.height=img.height*scale;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      res(canvas.toDataURL("image/jpeg",0.7));
    };
    reader.readAsDataURL(file);
  });
}

window.addProduct = async ()=>{
  const title=document.getElementById("title").value;
  const price=document.getElementById("price").value;
  const desc=document.getElementById("desc").value;
  const files=document.getElementById("images").files;

  if(files.length===0){alert("Додай фото");return;}

  let images=[];
  for(let f of files){
    images.push(await toBase64(f));
  }

  await addDoc(collection(db,"posts"),{
    title,price,desc,images
  });
};

const list=document.getElementById("list");

onSnapshot(collection(db,"posts"),(snap)=>{
  list.innerHTML="";
  snap.forEach(doc=>{
    const p=doc.data();
    const imgs=p.images||[];

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <p>${p.price}</p>
      ${imgs.length?`<img src="${imgs[0]}" onclick="openModal(${JSON.stringify(imgs)})">`:""}
    `;

    list.appendChild(div);
  });
});

/* MODAL */
let currentImages=[];
let currentIndex=0;
let scale=1;
let startDistance=0;

const modal=document.getElementById("modal");
const modalImg=document.getElementById("modalImg");

window.openModal=(images)=>{
  currentImages=images;
  currentIndex=0;
  scale=1;
  modal.style.display="flex";
  modalImg.src=currentImages[0];
};

window.closeModal=()=>{
  modal.style.display="none";
};

document.getElementById("prevBtn").onclick=(e)=>{
  e.stopPropagation();
  currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
};

document.getElementById("nextBtn").onclick=(e)=>{
  e.stopPropagation();
  currentIndex=(currentIndex+1)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
};

modal.onclick=()=>closeModal();

modalImg.onclick=(e)=>{
  e.stopPropagation();
  currentIndex=(currentIndex+1)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
};

/* SWIPE + ZOOM */
modal.addEventListener("touchstart",(e)=>{
  if(e.touches.length===2){
    startDistance=getDistance(e.touches);
  }
});

modal.addEventListener("touchmove",(e)=>{
  if(e.touches.length===2){
    let newDist=getDistance(e.touches);
    scale=newDist/startDistance;
    modalImg.style.transform=`scale(${scale})`;
  }
});

let startX=0;
modal.addEventListener("touchstart",(e)=>{
  if(e.touches.length===1){
    startX=e.touches[0].clientX;
  }
});

modal.addEventListener("touchend",(e)=>{
  if(e.changedTouches.length===1){
    let diff=startX-e.changedTouches[0].clientX;
    if(Math.abs(diff)>50){
      if(diff>0){next();}else{prev();}
    }
  }
});

function next(){
  currentIndex=(currentIndex+1)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
  modalImg.style.transform="scale(1)";
}

function prev(){
  currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
  modalImg.style.transform="scale(1)";
}

function getDistance(touches){
  let dx=touches[0].clientX-touches[1].clientX;
  let dy=touches[0].clientY-touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

</script>
</body>
</html>
