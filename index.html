<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Солодкий маркет 🍩</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: linear-gradient(135deg, #ffe0f0, #fff5cc);
  --card: white;
  --text: #000;
  --btn: #ff6fa5;
}

/* 🌙 DARK MODE */
body.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #fff;
  --btn: #bb86fc;
}

body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
h1 {
  text-align: center;
}

/* BUTTONS */
button {
  padding: 10px;
  border: none;
  background: var(--btn);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 5px;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

/* BOX */
.box {
  background: var(--card);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}

/* POSTS */
.posts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
}

.post {
  background: var(--card);
  padding: 10px;
  border-radius: 12px;
}

.post img {
  width: 100%;
  border-radius: 10px;
}

/* STICKERS */
.sticker {
  position: fixed;
  font-size: 30px;
  opacity: 0.2;
  pointer-events: none;
}

.s1 { top: 20px; left: 20px; }
.s2 { top: 50px; right: 30px; }
.s3 { bottom: 40px; left: 40px; }
.s4 { bottom: 20px; right: 20px; }

/* MOBILE */
@media (max-width: 600px) {
  body {
    padding: 5px;
  }

  h1 {
    font-size: 20px;
  }

  .top-bar {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<h1>🍩 Солодкий маркет</h1>

<div class="top-bar">
  <button onclick="toggleTheme()">🌙 / ☀️</button>
  <button onclick="toggleReader()">📖 Режим читання</button>
  <button onclick="switchMode()">🔐 Вхід</button>
</div>

<div id="roleSelect" class="box">
  <h3>Хто ви?</h3>
  <button onclick="enterGuest()">Гість</button>
  <button onclick="showLogin()">Адмін</button>
</div>

<div id="loginBox" class="box" style="display:none;">
  <h3>Вхід</h3>
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div id="searchBox" class="box" style="display:none;">
  <input id="search" placeholder="🔍 Пошук..." oninput="renderPosts()">
</div>

<div id="adminPanel" class="box" style="display:none;">
  <h3>Додати товар</h3>
  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">
  <input id="image" type="file">
  <button onclick="addPost()">➕ Додати</button>
</div>

<div id="posts" class="posts"></div>

<!-- 🍬 STICKERS -->
<div class="sticker s1">🍬</div>
<div class="sticker s2">🍭</div>
<div class="sticker s3">🍩</div>
<div class="sticker s4">🍪</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;
let readerMode = false;
let posts = [];

async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  posts = [];

  querySnapshot.forEach(docSnap => {
    posts.push({ id: docSnap.id, ...docSnap.data() });
  });

  renderPosts();
}

function enterGuest() {
  isAdmin = false;

  document.getElementById("roleSelect").style.display = "none";
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("searchBox").style.display = "block";

  loadPosts();
}

function showLogin() {
  document.getElementById("roleSelect").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
}

function loginAdmin() {
  const login = document.getElementById("login").value;
  const password = document.getElementById("password").value;

  if (login === "Nastuhsa" && password === "Babikovf") {
    isAdmin = true;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("searchBox").style.display = "block";

    loadPosts();
  } else {
    alert("Неправильний логін");
  }
}

function switchMode() {
  showLogin();
}

function renderPosts() {
  const container = document.getElementById("posts");
  const search = document.getElementById("search")?.value?.toLowerCase() || "";

  container.innerHTML = "";

  posts
    .filter(p => p.title.toLowerCase().includes(search))
    .forEach(p => {

      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>${p.price} грн</b><br>
        ${p.image ? `<img src="${p.image}">` : ""}
        ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌</button>` : ""}
      `;

      container.appendChild(div);
    });
}

async function addPost() {
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const price = document.getElementById("price").value.trim();
  const file = document.getElementById("image").files[0];

  if (!title || !price) {
    alert("Заповни назву і ціну");
    return;
  }

  let imageBase64 = null;

  if (file) {
    imageBase64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  await addDoc(collection(db, "posts"), {
    title,
    desc,
    price,
    image: imageBase64
  });

  loadPosts();
}

async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
  loadPosts();
}

/* 🌙 THEME */
function toggleTheme() {
  document.body.classList.toggle("dark");
}

/* 📖 READER MODE */
function toggleReader() {
  readerMode = !readerMode;

  document.body.style.fontSize = readerMode ? "18px" : "";
  document.querySelectorAll(".post").forEach(p => {
    p.style.maxWidth = readerMode ? "600px" : "";
    p.style.margin = readerMode ? "10px auto" : "";
  });
}

window.enterGuest = enterGuest;
window.showLogin = showLogin;
window.loginAdmin = loginAdmin;
window.switchMode = switchMode;
window.addPost = addPost;
window.deletePost = deletePost;
window.toggleTheme = toggleTheme;
window.toggleReader = toggleReader;

window.addEventListener("DOMContentLoaded", () => {
  loadPosts();
  enterGuest();
});

</script>

</body>
</html>
