<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
:root {
  --bg: #f2f4f8;
  --card: #ffffff;
  --text: #222;
  --accent: #ff6b9a;
}

body.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #f1f1f1;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* Header */
header {
  background: linear-gradient(135deg, #ff6b9a, #ff8fb3);
  color: white;
  padding: 15px;
  text-align: center;
}

/* Controls */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
}

/* Inputs */
input, select {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* Layouts */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.list {
  display: block;
}

/* Card */
.post {
  background: var(--card);
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  display: flex;
  gap: 10px;
}

.grid .post {
  flex-direction: column;
}

.post img {
  width: 100%;
  border-radius: 10px;
  object-fit: cover;
}

.post-content {
  flex: 1;
}

button {
  padding: 8px 10px;
  border: none;
  border-radius: 6px;
  background: var(--accent);
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<header>
  🍬 Солодкий ринок
  <br>
  <button onclick="toggleTheme()">🌙 / ☀️</button>
</header>

<div class="controls">

<input id="search" placeholder="Пошук..." oninput="renderPosts()">

<select id="sort" onchange="renderPosts()">
  <option value="">Без сортування</option>
  <option value="asc">Ціна ↑</option>
  <option value="desc">Ціна ↓</option>
</select>

<select id="colorFilter" onchange="renderPosts()">
  <option value="">Всі кольори</option>
  <option value="pink">Рожевий</option>
  <option value="brown">Коричневий</option>
  <option value="white">Білий</option>
</select>

<button onclick="setGrid()">🔳 Сітка</button>
<button onclick="setList()">📄 Рядок</button>

</div>

<div class="container">

<div id="adminPanel">
  <h3>Адмін панель</h3>

  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">

  <input id="color" placeholder="Колір (pink, brown, white)">

  <input id="inst" placeholder="Instagram">
  <input id="tg" placeholder="Telegram">
  <input id="phone" placeholder="Телефон">
  <input id="email" placeholder="Email">

  <input type="file" id="image">

  <button onclick="addPost()">➕ Додати</button>
</div>

<div id="posts" class="grid"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let posts = [];
let layout = "grid";

/* Завантаження */
async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  posts = [];

  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  renderPosts();
}

/* Рендер */
function renderPosts() {
  const container = document.getElementById("posts");
  const search = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort").value;
  const color = document.getElementById("colorFilter").value;

  let filtered = posts.filter(p =>
    (p.title || "").toLowerCase().includes(search) &&
    (color === "" || p.color === color)
  );

  if (sort === "asc") filtered.sort((a,b)=>a.price-b.price);
  if (sort === "desc") filtered.sort((a,b)=>b.price-a.price);

  container.className = layout;

  container.innerHTML = "";

  filtered.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}

      <div class="post-content">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>💰 ${p.price} грн</b>
        <p>🎨 ${p.color || ""}</p>

        <div>
          ${p.inst ? `<a href="${p.inst}" target="_blank">📸 Instagram</a><br>` : ""}
          ${p.tg ? `<a href="${p.tg}" target="_blank">💬 Telegram</a><br>` : ""}
          ${p.phone ? `<p>📞 ${p.phone}</p>` : ""}
          ${p.email ? `<p>📧 ${p.email}</p>` : ""}
        </div>
      </div>
    `;

    container.appendChild(div);
  });
}

/* Додати */
async function addPost() {
  const title = titleInput.value;
  const desc = descInput.value;
  const price = Number(priceInput.value);
  const color = document.getElementById("color").value;

  const inst = document.getElementById("inst").value;
  const tg = document.getElementById("tg").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  const file = document.getElementById("image").files[0];

  let image = null;

  const save = async () => {
    await addDoc(collection(db, "posts"), {
      title,
      desc,
      price,
      color,
      inst,
      tg,
      phone,
      email,
      image
    });

    loadPosts();
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      image = e.target.result;
      save();
    };
    reader.readAsDataURL(file);
  } else {
    save();
  }
}

/* Layout */
function setGrid() {
  layout = "grid";
  renderPosts();
}

function setList() {
  layout = "list";
  renderPosts();
}

/* Тема */
function toggleTheme() {
  document.body.classList.toggle("dark");
}

/* Init */
loadPosts();

/* global */
window.addPost = addPost;
window.renderPosts = renderPosts;
window.setGrid = setGrid;
window.setList = setList;
window.toggleTheme = toggleTheme;
</script>

</body>
</html>
