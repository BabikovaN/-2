<!DOCTYPE html>   
<html lang="uk">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
:root {
  --bg:#f4f6f9;
  --card:#fff;
  --text:#111;
  --accent:#4da3ff;
}

body.dark {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#eee;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header {
  padding:12px;
  display:flex;
  justify-content:space-between;
  background:var(--accent);
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.grid {
  display:grid;
 grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:var(--card);
  padding:10px;
  border-radius:12px;
}

.card img, .card video {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

#adminPanel {
  display:none;
  padding:15px;
  background:var(--card);
  margin:10px;
  border-radius:10px;
}

#loginBox {
  display:none;
  padding:10px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#modal img {
  max-width:95%;
  max-height:80%;
  transition: transform 0.2s;
  cursor: grab;
  user-select:none;
}

.modal-controls {
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="showLogin()">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div style="padding:10px;">
  <input id="search" placeholder="🔍 Пошук товару..." style="width:100%;padding:10px;border-radius:8px;border:none;">
</div>

<div id="loginBox">
  <input id="login" placeholder="login"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button onclick="loginAdmin()">Login</button>
</div>
  
<div id="adminPanel">
  <h3>Адмінка</h3>

  <input id="title" placeholder="Назва"><br><br>
  <input id="price" placeholder="Ціна"><br><br>
  <textarea id="desc" placeholder="Опис"></textarea><br><br>

  <input id="video" placeholder="Video URL (mp4)"><br><br>

  <input id="inst" placeholder="Instagram"><br>
  <input id="tg" placeholder="Telegram"><br>
  <input id="phone" placeholder="Phone"><br>
  <input id="email" placeholder="Email"><br><br>

  <input type="file" id="images" multiple><br><br>

  <button id="addBtn">Зберегти товар</button>
</div>

<div id="posts" class="grid"></div>

<div id="modal">
  <img id="modalImg">

  <div class="modal-controls">
    <button onclick="prevImg()">⬅</button>
    <button onclick="nextImg()">➡</button>
    <button onclick="zoomIn()">➕</button>
    <button onclick="zoomOut()">➖</button>
    <button onclick="closeModal()">✖</button>
  </div>
</div>
  
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
  storageBucket: "sweet-market-9c94e.appspot.com",
  messagingSenderId: "583966719717",
  appId: "1:583966719717:web:f16675f96d95fa83b19e0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DOM */
const postsDiv = document.getElementById("posts");
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const price = document.getElementById("price");
const images = document.getElementById("images");
const video = document.getElementById("video");

const inst = document.getElementById("inst");
const tg = document.getElementById("tg");
const phone = document.getElementById("phone");
const email = document.getElementById("email");

const login = document.getElementById("login");
const password = document.getElementById("password");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

const search = document.getElementById("search");

/* STATE */
let posts = [];
let isAdmin = false;
let editId = null;
let oldImages = [];

let currentImages = [];
let currentIndex = 0;
let zoom = 1;

/* LOAD */
onSnapshot(collection(db,"posts"), (snapshot)=>{
  posts = snapshot.docs.map(d=>({id:d.id, ...d.data()}));
  render();
});

/* ADD / EDIT */
document.getElementById("addBtn").onclick = async ()=>{

  const files = images.files;
  const imgs = [];

  for(let file of files){
    const base64 = await new Promise(res=>{
      const reader = new FileReader();
      reader.onload = ()=>res(reader.result);
      reader.readAsDataURL(file);
    });
    imgs.push(base64);
  }

  const finalImages = imgs.length ? imgs : oldImages;

  let existingLikes = 0;
  if(editId){
    const p = posts.find(x=>x.id===editId);
    if(p) existingLikes = p.likes || 0;
  }

  const data = {
    title: title.value,
    desc: desc.value,
    price: Number(price.value)||0,
    images: finalImages,
    video: video.value || "",
    inst: inst.value,
    tg: tg.value,
    phone: phone.value,
    email: email.value,
    likes: existingLikes
  };

  if(editId){
    await updateDoc(doc(db,"posts",editId), data);
    editId = null;
  } else {
    await addDoc(collection(db,"posts"), data);
  }

  title.value = desc.value = price.value = inst.value = tg.value = phone.value = email.value = video.value = "";
  images.value = "";
  oldImages = [];
};

 function render(){
  postsDiv.innerHTML="";

  const val = (search.value || "").trim().toLowerCase();

  let filtered = posts;

  if (val.length > 0) {
    filtered = posts.filter(p =>
      (p.title || "").toLowerCase().includes(val)
    );
  }

  filtered.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";

    let mediaHTML = "";

    if(p.video){
      mediaHTML = `<video controls src="${p.video}"></video>`;
    } else if(p.images && p.images.length){
      mediaHTML = `<img src="${p.images[0]}" onclick="openModalById('${p.id}')">`;
    }

    div.innerHTML = `
      ${mediaHTML}

      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b><br><br>

      ❤️ ${p.likes || 0}
      <button onclick="likePost('${p.id}')">👍</button>

      <br><br>

      ${!isAdmin ? `
        <div style="font-size:14px;">
          ${p.inst ? `<a href="${p.inst}" target="_blank">📷 Instagram</a><br>` : ""}
          ${p.tg ? `✈️ ${p.tg}<br>` : ""}
          ${p.phone ? `📞 ${p.phone}<br>` : ""}
          ${p.email ? `✉️ ${p.email}` : ""}
        </div>
      ` : ""}

      ${isAdmin ? `
        <button onclick="editPost('${p.id}')">✏️ Edit</button>
        <button onclick="deletePost('${p.id}')">🗑 Delete</button>
      ` : ""}
    `;

    postsDiv.appendChild(div);
  });
}

/* LIKE */
window.likePost = async (id)=>{
  const p = posts.find(x=>x.id===id);
  if(!p) return;

  await updateDoc(doc(db,"posts",id), {
    likes: (p.likes || 0) + 1
  });
};

/* ADMIN */
window.loginAdmin = ()=>{
  if(login.value==="admin" && password.value==="1234"){
    isAdmin=true;
    adminPanel.style.display="block";
    loginBox.style.display="none";
  } else alert("Невірний логін");
};

window.logout = ()=>{
  isAdmin=false;
  adminPanel.style.display="none";
};

window.showLogin = ()=>{
  search.blur();
  loginBox.style.display="block";
};

/* EDIT */
window.editPost = (id)=>{
  const p = posts.find(x=>x.id===id);
  if(!p) return;

  title.value=p.title;
  desc.value=p.desc;
  price.value=p.price;
  inst.value=p.inst||"";
  tg.value=p.tg||"";
  phone.value=p.phone||"";
  email.value=p.email||"";
  video.value=p.video||"";

  oldImages = p.images || [];
  editId=id;
};

/* DELETE */
window.deletePost = async (id)=>{
  if(confirm("Видалити товар?")){
    await deleteDoc(doc(db,"posts",id));
  }
};

/* MODAL */
window.openModalById = (id)=>{
  const p = posts.find(x=>x.id===id);
  if(!p) return;
  openModal(p.images);
};

function openModal(imgs){
  currentImages = imgs;
  currentIndex = 0;
  zoom = 1;

  modal.style.display="flex";
  renderModal();
}

function renderModal(){
  modalImg.src = currentImages[currentIndex];
  modalImg.style.transformOrigin = "center center";
  modalImg.style.transform = `scale(${zoom})`;
}
  
window.nextImg = ()=>{
  currentIndex = (currentIndex + 1) % currentImages.length;
  zoom = 1;
  renderModal();
};

window.prevImg = ()=>{
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
  zoom = 1;
  renderModal();
};

window.zoomIn = ()=>{
  zoom += 0.2;
  renderModal();
};

window.zoomOut = ()=>{
  zoom = Math.max(1, zoom - 0.2);
  renderModal();
};
  
window.closeModal = ()=>{
  modal.style.display="none";
};
 /* FIX: не закривати modal при кліку на зображення */
/* THEME */
window.toggleTheme = ()=>{
  document.body.classList.toggle("dark");
};

/* SEARCH */
search.oninput = render;

</script>

</body>
</html>
