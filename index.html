<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #dbefff, #f5fbff);
  color: #333;
}

/* HEADER */
header {
  background: #9fd3ff;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ADMIN BUTTON */
#adminBtn {
  cursor: pointer;
  font-weight: bold;
}

/* LOGIN BOX */
#loginBox {
  position: fixed;
  top: 60px;
  right: 10px;
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 220px;
  display: none;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px;
  border: none;
  background: #7cc6ff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #5fb5f5;
}

/* LAYOUT */
.container {
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

/* CARD */
.card {
  background: white;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

/* ADMIN PANEL */
#adminPanel {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: none;
}

/* MOBILE */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  🍬 Солодкий ринок
  <div id="adminBtn">🔐 Admin</div>
</header>

<!-- LOGIN -->
<div id="loginBox">
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div class="container">

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Адмін панель</h3>

  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">

  <input id="inst" placeholder="Instagram (необов'язково)">
  <input id="tg" placeholder="Telegram (необов'язково)">
  <input id="phone" placeholder="Телефон (необов'язково)">
  <input id="email" placeholder="Email (необов'язково)">

  <input type="file" id="image">

  <button id="addBtn">Додати</button>
</div>

<div id="posts" class="grid"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* ELEMENTS */
const adminBtn = document.getElementById("adminBtn");
const loginBox = document.getElementById("loginBox");
const adminPanel = document.getElementById("adminPanel");
const postsDiv = document.getElementById("posts");

/* INPUTS */
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const price = document.getElementById("price");
const image = document.getElementById("image");
const inst = document.getElementById("inst");
const tg = document.getElementById("tg");
const phone = document.getElementById("phone");
const email = document.getElementById("email");

let isAdmin = false;
let posts = [];

/* 🔐 CHECK ADMIN SESSION */
window.onload = () => {
  if (localStorage.getItem("admin") === "true") {
    isAdmin = true;
    adminPanel.style.display = "block";
  }

  loadPosts();
};

/* ADMIN BUTTON */
adminBtn.onclick = () => {
  loginBox.style.display = loginBox.style.display === "block" ? "none" : "block";
};

/* LOGIN */
window.loginAdmin = () => {
  if (login.value === "admin" && password.value === "1234") {
    isAdmin = true;
    localStorage.setItem("admin", "true");

    loginBox.style.display = "none";
    adminPanel.style.display = "block";

    loadPosts();
  } else {
    alert("❌ Невірний логін");
  }
};

/* LOAD POSTS */
async function loadPosts() {
  const snap = await getDocs(collection(db,"posts"));
  posts = [];

  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  render();
}

/* RENDER */
function render() {
  postsDiv.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>

      <div style="font-size:12px;">
        ${p.inst ? `📸 ${p.inst}<br>` : ""}
        ${p.tg ? `✈️ ${p.tg}<br>` : ""}
        ${p.phone ? `📞 ${p.phone}<br>` : ""}
        ${p.email ? `✉️ ${p.email}<br>` : ""}
      </div>

      ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌</button>` : ""}
    `;

    postsDiv.appendChild(div);
  });
}

/* ➕ ADD POST */
document.getElementById("addBtn").onclick = async () => {

  if (!title.value || !desc.value || !price.value) {
    alert("❗ Заповни обов'язкові поля");
    return;
  }

  const file = image.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = async e => {
      await addDoc(collection(db,"posts"), {
        title: title.value,
        desc: desc.value,
        price: Number(price.value),
        inst: inst.value || "",
        tg: tg.value || "",
        phone: phone.value || "",
        email: email.value || "",
        image: e.target.result
      });

      clearForm();
      loadPosts();
    };

    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db,"posts"), {
      title: title.value,
      desc: desc.value,
      price: Number(price.value),
      inst: inst.value || "",
      tg: tg.value || "",
      phone: phone.value || "",
      email: email.value || "",
      image: ""
    });

    clearForm();
    loadPosts();
  }
};

/* CLEAR FORM */
function clearForm() {
  title.value = "";
  desc.value = "";
  price.value = "";
  inst.value = "";
  tg.value = "";
  phone.value = "";
  email.value = "";
  image.value = "";
}

/* DELETE */
window.deletePost = async (id) => {
  if (!confirm("Видалити?")) return;
  await deleteDoc(doc(db,"posts",id));
  loadPosts();
};

loadPosts();
</script>

</body>
</html>
