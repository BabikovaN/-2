<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
:root {
  --bg: #eaf6ff;
  --card: white;
  --text: #333;
}

body.dark {
  --bg: #1e2a36;
  --card: #2a3a4a;
  --text: #fff;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

header {
  padding: 10px;
  display:flex;
  justify-content:space-between;
  background:#9fd3ff;
  flex-wrap:wrap;
}

.controls {
  padding:10px;
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

input, select, button, textarea {
  padding:8px;
  border-radius:8px;
  border:none;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}

.list {
  display:block;
  padding:10px;
}

.card {
  background: var(--card);
  padding:10px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  overflow-wrap: break-word;
  word-break: break-word;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

#modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#modal img {
  max-width:90%;
  max-height:90%;
}

#modal button {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  background: rgba(255,255,255,0.3);
}

#prevBtn { left:10px; }
#nextBtn { right:10px; }

#loader {
  display:none;
}
</style>
</head>

<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button id="adminBtn">🔐 Admin</button>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="logout()">🚪</button>
  </div>
</header>

<div id="loginBox" style="display:none; padding:10px;">
  <h3>Вхід адміна</h3>
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div class="controls">
  <input id="search" placeholder="Пошук...">
  <select id="sort">
    <option value="">Сортування</option>
    <option value="asc">Ціна ↑</option>
    <option value="desc">Ціна ↓</option>
  </select>

  <button onclick="toggleView()">🔘 Grid/List</button>
</div>

<div id="adminPanel" style="padding:10px; display:none;">
  <h3>Адмін</h3>

  <input id="title" placeholder="Назва">
  <input id="price" placeholder="Ціна">
  <textarea id="desc" placeholder="Опис"></textarea>

  <input type="file" id="images" multiple>

  <input id="inst" placeholder="Instagram">
  <input id="tg" placeholder="Telegram">
  <input id="phone" placeholder="Phone">
  <input id="email" placeholder="Email">

  <button id="addBtn">Додати</button>
  <div id="loader">⏳ Завантаження...</div>
</div>

<div id="posts" class="grid"></div>

<div id="modal" onclick="closeModal()">
  <button id="prevBtn">⬅️</button>
  <img id="modalImg">
  <button id="nextBtn">➡️</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
  storageBucket: "sweet-market-9c94e.firebasestorage.app",
  messagingSenderId: "583966719717",
  appId: "1:583966719717:web:f16675f96d95fa83b19e0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let posts = [];
let editId = null;
let isAdmin = localStorage.getItem("admin")==="true";
let view = "grid";

let currentImages = [];
let currentIndex = 0;

/* LOAD */
function load(){
  onSnapshot(collection(db,"posts"), snap=>{
    posts = [];
    snap.forEach(d=>posts.push({id:d.id,...d.data()}));
    render();
  });
}

/* RENDER */
function render(){
  postsDiv.className = view;

  let filtered = [...posts];

  const search = document.getElementById("search").value.toLowerCase();
  if(search){
    filtered = filtered.filter(p=>p.title.toLowerCase().includes(search));
  }

  const sort = document.getElementById("sort").value;
  if(sort==="asc") filtered.sort((a,b)=>a.price-b.price);
  if(sort==="desc") filtered.sort((a,b)=>b.price-a.price);

  postsDiv.innerHTML="";

  filtered.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    const imgs = p.images || [];
    const img = imgs[0] || "";

    div.innerHTML=`
      ${img?`<img src="${img}" onclick='openModal(${JSON.stringify(imgs)})'>`:""}
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>
    `;

    postsDiv.appendChild(div);
  });
}

/* MODAL */
window.openModal=(images)=>{
  currentImages = images;
  currentIndex = 0;

  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");

  modal.style.display="flex";
  modalImg.src=currentImages[0];
};

window.closeModal=()=>{
  document.getElementById("modal").style.display="none";
};

/* SWIPE */
let startX=0;

modal.addEventListener("touchstart",(e)=>{
  if(e.touches.length===1){
    startX=e.touches[0].clientX;
  }
});

modal.addEventListener("touchend",(e)=>{
  let diff = startX - e.changedTouches[0].clientX;

  if(Math.abs(diff)>50){
    if(diff>0) nextImage();
    else prevImage();
  }
});

/* BUTTONS */
document.getElementById("prevBtn").onclick=(e)=>{
  e.stopPropagation();
  prevImage();
};

document.getElementById("nextBtn").onclick=(e)=>{
  e.stopPropagation();
  nextImage();
};

function nextImage(){
  if(!currentImages.length) return;
  currentIndex = (currentIndex+1)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
}

function prevImage(){
  if(!currentImages.length) return;
  currentIndex = (currentIndex-1+currentImages.length)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
}

/* ADD */
document.getElementById("addBtn").onclick = async ()=>{

  const files = document.getElementById("images").files;

  let imgs = [];

  for(let f of files){
    imgs.push(await toBase64(f));
  }

  await addDoc(collection(db,"posts"), {
    title:title.value,
    desc:desc.value,
    price:Number(price.value)||0,
    images:imgs,
    inst:inst.value,
    tg:tg.value,
    phone:phone.value,
    email:email.value
  });

  loader.style.display="none";
};

/* UTILS */
function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* INIT */
window.onload=()=>{
  load();
};
</script>

</body>
</html>
