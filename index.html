<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6fb;
}

/* AUTH */
#auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

/* LAYOUT */
.hidden { display: none; }

header {
  background: #ff6b9a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 15px;
}

/* PRODUCTS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

.product {
  background: white;
  border-radius: 12px;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.product img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  font-weight: bold;
  margin-top: 5px;
}

/* FORM */
input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  background: #ff6b9a;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

/* SIDE PANEL */
.side {
  position: fixed;
  right: 0;
  top: 80px;
  background: white;
  padding: 10px;
  border-radius: 10px 0 0 10px;
  width: 150px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">
    <h3>Виберіть роль</h3>
    <button id="guestBtn">Гість</button>
    <button id="adminBtn">Адмін</button>

    <div id="loginBox" class="hidden">
      <input id="login" placeholder="Логін">
      <input id="password" type="password" placeholder="Пароль">
      <button id="loginBtn">Увійти</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <div>🍬 Солодкий ринок</div>
  <button id="logoutBtn">Вийти</button>
</header>

<div class="container">

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="hidden">
    <h3>Адмін панель</h3>

    <input id="title" placeholder="Назва">
    <textarea id="desc" placeholder="Опис"></textarea>
    <input id="price" placeholder="Ціна">

    <input id="inst" placeholder="Instagram">
    <input id="tg" placeholder="Telegram">
    <input id="phone" placeholder="Телефон">
    <input id="email" placeholder="Email">

    <input type="file" id="image">

    <button id="addBtn">Додати товар</button>
  </div>

  <div id="products" class="grid"></div>

</div>

<!-- SIDE -->
<div class="side">
  <div id="roleText"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  query, 
  orderBy 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* ELEMENTS */
const auth = document.getElementById("auth");
const app = document.getElementById("app");
const adminPanel = document.getElementById("adminPanel");
const products = document.getElementById("products");
const roleText = document.getElementById("roleText");

/* AUTH BUTTONS */
const guestBtn = document.getElementById("guestBtn");
const adminBtn = document.getElementById("adminBtn");
const loginBox = document.getElementById("loginBox");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const addBtn = document.getElementById("addBtn");

/* INPUTS */
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const price = document.getElementById("price");
const inst = document.getElementById("inst");
const tg = document.getElementById("tg");
const phone = document.getElementById("phone");
const email = document.getElementById("email");
const image = document.getElementById("image");

let isAdmin = false;

/* INIT */
window.onload = () => {
  const role = localStorage.getItem("role");

  if (role === "admin") {
    isAdmin = true;
    startApp();
  } else if (role === "guest") {
    isAdmin = false;
    startApp();
  }
};

/* EVENTS */
guestBtn.onclick = () => {
  isAdmin = false;
  localStorage.setItem("role", "guest");
  startApp();
};

adminBtn.onclick = () => {
  loginBox.classList.remove("hidden");
};

loginBtn.onclick = () => {
  const l = login.value;
  const p = password.value;

  if (l === "admin" && p === "1234") {
    isAdmin = true;
    localStorage.setItem("role", "admin");
    startApp();
  } else {
    alert("Невірний логін");
  }
};

logoutBtn.onclick = () => {
  localStorage.removeItem("role");
  location.reload();
};

addBtn.onclick = addProduct;

/* APP START */
function startApp() {
  auth.classList.add("hidden");
  app.classList.remove("hidden");

  adminPanel.classList.toggle("hidden", !isAdmin);
  roleText.innerText = isAdmin ? "Адмін" : "Гість";

  loadProducts();
}

/* LOAD */
async function loadProducts() {
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  products.innerHTML = "";

  snap.forEach(doc => {
    const p = doc.data();

    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <div class="price">${p.price} грн</div>

      <small>${p.inst || ""}</small>
      <small>${p.tg || ""}</small>
      <small>${p.phone || ""}</small>
      <small>${p.email || ""}</small>
    `;

    products.appendChild(div);
  });
}

/* ADD */
async function addProduct() {
  const file = image.files[0];
  let imgData = "";

  if (file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      imgData = e.target.result;

      await addDoc(collection(db, "posts"), {
        title: title.value,
        desc: desc.value,
        price: price.value,
        inst: inst.value,
        tg: tg.value,
        phone: phone.value,
        email: email.value,
        image: imgData,
        createdAt: new Date()
      });

      loadProducts();
    };
    reader.readAsDataURL(file);
  }
}

</script>

</body>
</html>
