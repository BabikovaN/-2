<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
:root {
  --bg:#f4f6f9;
  --card:#fff;
  --text:#111;
  --accent:#4da3ff;
}

body.dark {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#eee;
}

#modalContent {
  display:flex;
  flex-direction:column;
  align-items:center;
}

#modal img {
  max-width:95%;
  max-height:80%;
  transition: transform 0.2s;
  cursor: zoom-in;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header {
  padding:12px;
  display:flex;
  justify-content:space-between;
  background:var(--accent);
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:var(--card);
  padding:10px;
  border-radius:12px;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

#adminPanel {
  display:none;
  padding:15px;
  background:var(--card);
  margin:10px;
  border-radius:10px;
}

#loginBox {
  display:none;
  padding:10px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#modal img, #modal video {
  max-width:95%;
  max-height:80%;
}

.modal-controls {
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="showLogin()">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div style="padding:10px;">
  <input id="search" placeholder="🔍 Пошук товару..." style="width:100%;padding:10px;border-radius:8px;border:none;">
</div>

<div id="loginBox">
  <input id="login" placeholder="login"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button onclick="loginAdmin()">Login</button>
</div>

<div id="adminPanel">
  <h3>Адмінка</h3>

  <input id="title" placeholder="Назва"><br><br>
  <input id="price" placeholder="Ціна"><br><br>
  <textarea id="desc" placeholder="Опис"></textarea><br><br>

  <input type="file" id="images" multiple accept="image/*,video/*"><br><br>

  <input id="inst" placeholder="Instagram"><br>
  <input id="tg" placeholder="Telegram"><br>
  <input id="phone" placeholder="Phone"><br>
  <input id="email" placeholder="Email"><br><br>

  <button id="addBtn">Зберегти товар</button>
</div>

<div id="posts" class="grid"></div>

<div id="modal" onclick="closeModal(event)">
  <div id="modalContent" onclick="event.stopPropagation()">
    <div id="mediaWrapper">
      <img id="modalImg">
      <video id="modalVideo" controls style="display:none;"></video>
    </div>

    <div class="modal-controls">
      <button onclick="prevMedia()">⬅</button>
      <button onclick="nextMedia()">➡</button>
      <button onclick="zoomIn()">➕</button>
      <button onclick="zoomOut()">➖</button>
      <button onclick="closeModal()">✖</button>
    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsDiv = document.getElementById("posts");
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const price = document.getElementById("price");
const images = document.getElementById("images");
const inst = document.getElementById("inst");
const tg = document.getElementById("tg");
const phone = document.getElementById("phone");
const email = document.getElementById("email");

const login = document.getElementById("login");
const password = document.getElementById("password");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalVideo = document.getElementById("modalVideo");

const search = document.getElementById("search");

let posts = [];
let isAdmin = false;
let editId = null;

let currentMedia = [];
let currentIndex = 0;
let zoom = 1;

/* LOAD */
onSnapshot(collection(db,"posts"), (snapshot)=>{
  posts = snapshot.docs.map(d=>({id:d.id, ...d.data()}));
  render();
});

/* ADD */
document.getElementById("addBtn").onclick = async ()=>{

  const files = images.files;
  const media = [];

  for(let file of files){
    const base64 = await new Promise(res=>{
      const reader = new FileReader();
      reader.onload = ()=>res(reader.result);
      reader.readAsDataURL(file);
    });

    const isVideo = file.type.startsWith("video");

    media.push({
      type: isVideo ? "video" : "image",
      url: base64
    });
  }

  const data = {
    title: title.value,
    desc: desc.value,
    price: Number(price.value)||0,
    media: media,
    inst: inst.value,
    tg: tg.value,
    phone: phone.value,
    email: email.value,
    likes: 0
  };

  if(editId){
    await updateDoc(doc(db,"posts",editId), data);
    editId = null;
  } else {
    await addDoc(collection(db,"posts"), data);
  }

  title.value = desc.value = price.value = inst.value = tg.value = phone.value = email.value = "";
  images.value = "";
};

/* RENDER */
function render(){
  postsDiv.innerHTML="";

  const val = search.value.toLowerCase();

  let filtered = posts.filter(p =>
    p.title.toLowerCase().includes(val)
  );

  filtered.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";

    const first = p.media?.[0];

    div.innerHTML = `
      ${first ? `<img src="${first.url}" onclick="openModalById('${p.id}')">` : ""}

      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b><br><br>

      ❤️ ${p.likes || 0}
    `;

    postsDiv.appendChild(div);
  });
}

/* MODAL */
window.openModalById = (id)=>{
  const p = posts.find(x=>x.id===id);
  if(!p) return;

  currentMedia = p.media || [];
  currentIndex = 0;
  zoom = 1;

  modal.style.display="flex";
  renderMedia();
};

function renderMedia(){
  const item = currentMedia[currentIndex];

  if(!item) return;

  if(item.type === "image"){
    modalImg.style.display="block";
    modalVideo.style.display="none";
    modalImg.src = item.url;
    modalImg.style.transform = `scale(${zoom})`;
  } else {
    modalImg.style.display="none";
    modalVideo.style.display="block";
    modalVideo.src = item.url;
  }
}

window.nextMedia = ()=>{
  currentIndex = (currentIndex + 1) % currentMedia.length;
  zoom = 1;
  renderMedia();
};

window.prevMedia = ()=>{
  currentIndex = (currentIndex - 1 + currentMedia.length) % currentMedia.length;
  zoom = 1;
  renderMedia();
};

window.zoomIn = ()=>{
  zoom += 0.2;
  renderMedia();
};

window.zoomOut = ()=>{
  zoom = Math.max(1, zoom - 0.2);
  renderMedia();
};

window.closeModal = (e)=>{
  if(!e || e.target.id === "modal"){
    modal.style.display="none";
  }
};

/* AUTH */
window.loginAdmin = ()=>{
  if(login.value==="admin" && password.value==="1234"){
    isAdmin=true;
    adminPanel.style.display="block";
    loginBox.style.display="none";
  }
};

window.logout = ()=>{
  isAdmin=false;
  adminPanel.style.display="none";
};

window.showLogin = ()=>{
  loginBox.style.display="block";
};

window.toggleTheme = ()=>{
  document.body.classList.toggle("dark");
};

search.oninput = render;

</script>

</body>
</html>
