<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
}

.hidden { display: none; }

/* AUTH */
#authScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 280px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
}

button {
  padding: 8px 10px;
  border: none;
  background: #ff6b9a;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* APP */
#app {
  display: flex;
}

/* MAIN CONTENT */
.main {
  flex: 1;
}

/* HEADER */
header {
  background: #ff6b9a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* POSTS */
.container {
  padding: 15px;
}

.post {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 12px;
  display: flex;
  gap: 10px;
}

.post img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

/* SIDE PANEL */
.side {
  width: 200px;
  background: #fff;
  border-left: 1px solid #ddd;
  padding: 10px;
}

.side h3 {
  margin-top: 0;
}

.admin-panel {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h2>Оберіть роль</h2>

    <button onclick="enterGuest()">👤 Гість</button>
    <button onclick="showAdminLogin()">🔐 Адмін</button>

    <div id="adminLogin" class="hidden">
      <input id="login" placeholder="Логін">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="loginAdmin()">Увійти</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="main">

    <header>
      🍬 Солодкий ринок
      <button onclick="logout()">Вийти</button>
    </header>

    <div class="container">

      <!-- ADMIN PANEL -->
      <div id="adminPanel" class="admin-panel hidden">
        <h3>Адмін панель</h3>

        <input id="title" placeholder="Назва">
        <textarea id="desc" placeholder="Опис"></textarea>
        <input id="price" placeholder="Ціна">

        <input id="inst" placeholder="Instagram">
        <input id="tg" placeholder="Telegram">
        <input id="phone" placeholder="Телефон">
        <input id="email" placeholder="Email">

        <input type="file" id="image">

        <button onclick="addPost()">➕ Додати</button>
      </div>

      <div id="posts"></div>

    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side">
    <h3 id="roleTitle">Роль: Гість</h3>
    <p id="roleInfo">Перегляд товарів</p>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;
let posts = [];

/* AUTH */
function enterGuest() {
  isAdmin = false;
  startApp();
}

function showAdminLogin() {
  document.getElementById("adminLogin").classList.remove("hidden");
}

function loginAdmin() {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  if (l === "Nastuhsa" && p === "Babikovf") {
    isAdmin = true;
    startApp();
  } else {
    alert("Невірно");
  }
}

function startApp() {
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("adminPanel").classList.toggle("hidden", !isAdmin);

  document.getElementById("roleTitle").innerText = isAdmin ? "Роль: Адмін" : "Роль: Гість";
  document.getElementById("roleInfo").innerText = isAdmin ? "Можна додавати і видаляти" : "Тільки перегляд";

  loadPosts();
}

function logout() {
  location.reload();
}

/* FIREBASE */
async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  posts = [];

  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  renderPosts();
}

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}

      <div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>💰 ${p.price} грн</b>

        <div>
          ${p.inst ? `<a href="${p.inst}" target="_blank">Instagram</a><br>` : ""}
          ${p.tg ? `<a href="${p.tg}" target="_blank">Telegram</a><br>` : ""}
          ${p.phone ? `<p>📞 ${p.phone}</p>` : ""}
          ${p.email ? `<p>📧 ${p.email}</p>` : ""}
        </div>

        ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌ Видалити</button>` : ""}
      </div>
    `;

    container.appendChild(div);
  });
}

async function addPost() {
  const title = titleInput.value;
  const desc = descInput.value;
  const price = priceInput.value;

  const inst = document.getElementById("inst").value;
  const tg = document.getElementById("tg").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  const file = document.getElementById("image").files[0];

  let image = null;

  const save = async () => {
    await addDoc(collection(db, "posts"), {
      title,
      desc,
      price,
      inst,
      tg,
      phone,
      email,
      image
    });

    loadPosts();
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      image = e.target.result;
      save();
    };
    reader.readAsDataURL(file);
  } else {
    save();
  }
}

async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
  loadPosts();
}

/* GLOBAL */
window.enterGuest = enterGuest;
window.showAdminLogin = showAdminLogin;
window.loginAdmin = loginAdmin;
window.logout = logout;
window.addPost = addPost;
window.deletePost = deletePost;

</script>

</body>
</html>
