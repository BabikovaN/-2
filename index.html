<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Local</title>
<style>
:root {
  --bg: #eaf6ff;
  --card: white;
  --text: #333;
}
body.dark {
  --bg: #1e2a36;
  --card: #2a3a4a;
  --text: #fff;
}
body {
  margin:0;
  font-family:Arial;
  background: var(--bg);
  color: var(--text);
}
header {
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:#9fd3ff;
  flex-wrap:wrap;
}
.controls {
  padding:10px;
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}
input, select, button, textarea {
  padding:8px;
  border-radius:8px;
  border:none;
}
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}
.list {
  display:block;
  padding:10px;
}
.card {
  background: var(--card);
  padding:10px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  overflow-wrap: break-word;
  word-break: break-word;
}
.card img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition: transform 0.2s;
}
.card img:active {
  transform: scale(0.97);
}
@media (max-width: 600px) {
  .card img { height:200px; }
  .grid { grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); }
}
#modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}
#modal img {
  max-width:90%;
  max-height:90%;
}
#modal button {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  background: rgba(255,255,255,0.3);
  border:none;
  padding:10px;
  border-radius:8px;
}
#prevBtn { left:10px; }
#nextBtn { right:10px; }
</style>
</head>
<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="toggleView()">🔘 Grid/List</button>
  </div>
</header>

<div class="controls">
  <input id="search" placeholder="Пошук...">
</div>

<div id="posts" class="grid"></div>

<div id="modal" onclick="closeModal()">
  <button id="prevBtn" onclick="event.stopPropagation()">⬅️</button>
  <img id="modalImg">
  <button id="nextBtn" onclick="event.stopPropagation()">➡️</button>
</div>

<script>
let posts = [
  {
    title:"Пончик",
    desc:"Смачний пончик з кремом",
    price:15,
    images:["https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg"]
  },
  {
    title:"Кекс",
    desc:"Шоколадний кекс",
    price:20,
    images:["https://images.unsplash.com/photo-1565958011700-44c6319d0c4a"]
  },
  {
    title:"Морозиво",
    desc:"Ванільне морозиво",
    price:25,
    images:["https://images.unsplash.com/photo-1551024601-bec78aea704b"]
  }
];

let view="grid";
let currentImages=[], currentIndex=0;

const postsDiv = document.getElementById("posts");
const searchInput = document.getElementById("search");

function render(){
  postsDiv.className=view;
  let filtered = [...posts];
  const searchVal = searchInput.value.toLowerCase();
  if(searchVal) filtered = filtered.filter(p=>p.title.toLowerCase().includes(searchVal));

  postsDiv.innerHTML="";
  filtered.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    const img = p.images[0]||"";
    div.innerHTML=`
      ${img?`<img src="${img}" onclick='openModal(${JSON.stringify(p.images)})'>`:""}
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>
    `;
    postsDiv.appendChild(div);
  });
}

function toggleView(){
  view = view==="grid"?"list":"grid";
  render();
}

function toggleTheme(){
  document.body.classList.toggle("dark");
}

function openModal(images){
  currentImages = images;
  currentIndex=0;
  modal.style.display="flex";
  modalImg.src=currentImages[0];
}

function closeModal(){
  modal.style.display="none";
}

document.getElementById("prevBtn").onclick=(e)=>{
  e.stopPropagation();
  currentIndex = (currentIndex-1+currentImages.length)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
}

document.getElementById("nextBtn").onclick=(e)=>{
  e.stopPropagation();
  currentIndex = (currentIndex+1)%currentImages.length;
  modalImg.src=currentImages[currentIndex];
}

searchInput.oninput=render;

window.onload=render;
</script>

</body>
</html>
