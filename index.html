<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body { font-family: Arial; margin:0; background:#eaf6ff; }
header { padding:10px; display:flex; justify-content:space-between; background:#9fd3ff; }
.controls { padding:10px; display:flex; gap:5px; flex-wrap:wrap; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; padding:10px; }
.card { background:white; padding:10px; border-radius:10px; }
.card img { width:100%; height:150px; object-fit:cover; cursor:pointer; }

#adminPanel { display:none; padding:10px; background:#fff; }
#modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; justify-content:center; align-items:center; }
#modal img { max-width:90%; max-height:90%; }
button { padding:6px; }
</style>
</head>

<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button onclick="showLogin()">🔐 Admin</button>
    <button onclick="logout()">🚪</button>
  </div>
</header>

<div id="loginBox" style="display:none; padding:10px;">
  <input id="login" placeholder="login">
  <input id="password" type="password" placeholder="password">
  <button onclick="loginAdmin()">Login</button>
</div>

<div id="adminPanel">
  <h3>Адмінка</h3>
  <input id="title" placeholder="Назва"><br><br>
  <input id="price" placeholder="Ціна"><br><br>
  <textarea id="desc" placeholder="Опис"></textarea><br><br>

  <input type="file" id="images" multiple><br><br>

  <input id="inst" placeholder="Instagram link"><br>
  <input id="tg" placeholder="Telegram"><br>
  <input id="phone" placeholder="Phone"><br>
  <input id="email" placeholder="Email"><br><br>

  <button id="addBtn">Додати</button>
</div>

<div id="posts" class="grid"></div>

<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script type="module">

/* ===== FIREBASE ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  onSnapshot, 
  addDoc, 
  deleteDoc, 
  doc, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
  storageBucket: "sweet-market-9c94e.appspot.com",
  messagingSenderId: "583966719717",
  appId: "1:583966719717:web:f16675f96d95fa83b19e0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== DOM ===== */
const postsDiv = document.getElementById("posts");

const title = document.getElementById("title");
const desc = document.getElementById("desc");
const price = document.getElementById("price");
const images = document.getElementById("images");
const inst = document.getElementById("inst");
const tg = document.getElementById("tg");
const phone = document.getElementById("phone");
const email = document.getElementById("email");

const login = document.getElementById("login");
const password = document.getElementById("password");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

/* ===== STATE ===== */
let posts = [];
let isAdmin = false;
let editId = null;

/* ===== LOAD DATA ===== */
onSnapshot(collection(db,"posts"), (snapshot)=>{
  posts = snapshot.docs.map(d=>({id:d.id, ...d.data()}));
  render();
});

/* ===== ADD / EDIT ===== */
document.getElementById("addBtn").onclick = async ()=>{

  const files = images.files;
  const imgs = [];

  for(let file of files){
    const base64 = await new Promise(res=>{
      const reader = new FileReader();
      reader.onload = ()=>res(reader.result);
      reader.readAsDataURL(file);
    });
    imgs.push(base64);
  }

  const data = {
    title: title.value,
    desc: desc.value,
    price: Number(price.value)||0,
    images: imgs,
    inst: inst.value,
    tg: tg.value,
    phone: phone.value,
    email: email.value
  };

  if(editId){
    await updateDoc(doc(db,"posts",editId), data);
    editId = null;
  } else {
    await addDoc(collection(db,"posts"), data);
  }

  title.value = desc.value = price.value = inst.value = tg.value = phone.value = email.value = "";
  images.value = "";
};

/* ===== RENDER ===== */
function render(){
  postsDiv.innerHTML = "";

  posts.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${p.images?.[0] ? `<img src="${p.images[0]}" onclick="openModal(${JSON.stringify(p.images)})">` : ""}
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>

      <div>
        ${p.inst ? `<a href="${p.inst}" target="_blank">Instagram</a><br>` : ""}
        ${p.tg ? `TG: ${p.tg}<br>` : ""}
        ${p.phone ? `📞 ${p.phone}<br>` : ""}
        ${p.email ? `✉️ ${p.email}` : ""}
      </div>

      ${isAdmin ? `
        <button onclick="editPost('${p.id}')">Edit</button>
        <button onclick="deletePost('${p.id}')">Delete</button>
      ` : ""}
    `;

    postsDiv.appendChild(div);
  });
}

/* ===== ADMIN ===== */
window.loginAdmin = ()=>{
  if(login.value==="admin" && password.value==="1234"){
    isAdmin = true;
    adminPanel.style.display="block";
    loginBox.style.display="none";
  } else alert("Wrong");
};

window.logout = ()=>{
  isAdmin=false;
  adminPanel.style.display="none";
};

/* ===== EDIT / DELETE ===== */
window.editPost = (id)=>{
  const p = posts.find(x=>x.id===id);
  if(!p) return;

  title.value = p.title;
  desc.value = p.desc;
  price.value = p.price;
  inst.value = p.inst || "";
  tg.value = p.tg || "";
  phone.value = p.phone || "";
  email.value = p.email || "";

  editId = id;
};

window.deletePost = async (id)=>{
  if(confirm("Delete?")){
    await deleteDoc(doc(db,"posts",id));
  }
};

/* ===== MODAL ===== */
let currentImages = [];
let currentIndex = 0;

window.openModal = (imgs)=>{
  currentImages = imgs;
  currentIndex = 0;
  modal.style.display="flex";
  modalImg.src = currentImages[0];
};

window.closeModal = ()=>{
  modal.style.display="none";
};

/* ===== UI ===== */
window.showLogin = ()=>{
  loginBox.style.display="block";
};

</script>

</body>
</html>
