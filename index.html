<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
}

.hidden {
  display: none;
}

/* AUTH SCREEN */
#authScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.auth-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  width: 280px;
  text-align: center;
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
}

/* BUTTONS */
button {
  padding: 8px 10px;
  border: none;
  background: #ff6b9a;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

/* APP */
header {
  background: #ff6b9a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.container {
  padding: 15px;
  max-width: 1000px;
  margin: auto;
}

/* POST */
.post {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin: 10px 0;
  display: flex;
  gap: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.post img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.post-content {
  flex: 1;
}

/* ADMIN PANEL */
.admin-panel {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-box">
    <h2>Оберіть роль</h2>

    <button onclick="enterGuest()">👤 Гість</button>
    <button onclick="showAdminLogin()">🔐 Адмін</button>

    <div id="adminLogin" class="hidden">
      <input id="login" placeholder="Логін">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="loginAdmin()">Увійти</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

<header>
  🍬 Солодкий ринок
  <button onclick="logout()">Вийти</button>
</header>

<div class="container">

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-panel hidden">
  <h3>Адмін панель</h3>

  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">
  <input id="color" placeholder="Колір">

  <input id="inst" placeholder="Instagram">
  <input id="tg" placeholder="Telegram">
  <input id="phone" placeholder="Телефон">
  <input id="email" placeholder="Email">

  <input type="file" id="image">

  <button onclick="addPost()">➕ Додати</button>
</div>

<div id="posts"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5oRMuZ9-HWC2phcBhiURBlUiHvUJTKak",
  authDomain: "sweet-market-9c94e.firebaseapp.com",
  projectId: "sweet-market-9c94e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;
let posts = [];

/* ===== AUTH ===== */

function enterGuest() {
  isAdmin = false;
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("adminPanel").classList.add("hidden");

  loadPosts();
}

function showAdminLogin() {
  document.getElementById("adminLogin").classList.remove("hidden");
}

function loginAdmin() {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  if (l === "Nastuhsa" && p === "Babikovf") {
    isAdmin = true;

    document.getElementById("authScreen").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");

    loadPosts();
  } else {
    alert("Невірно");
  }
}

function logout() {
  location.reload();
}

/* ===== FIREBASE ===== */

async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  posts = [];

  snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

  renderPosts();
}

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}

      <div class="post-content">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>💰 ${p.price} грн</b>
        <p>🎨 ${p.color || ""}</p>

        <div>
          ${p.inst ? `<a href="${p.inst}" target="_blank">Instagram</a><br>` : ""}
          ${p.tg ? `<a href="${p.tg}" target="_blank">Telegram</a><br>` : ""}
          ${p.phone ? `<p>📞 ${p.phone}</p>` : ""}
          ${p.email ? `<p>📧 ${p.email}</p>` : ""}
        </div>

        ${isAdmin ? `<button onclick="deletePost('${p.id}')">❌ Видалити</button>` : ""}
      </div>
    `;

    container.appendChild(div);
  });
}

async function addPost() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const color = document.getElementById("color").value;

  const inst = document.getElementById("inst").value;
  const tg = document.getElementById("tg").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  const file = document.getElementById("image").files[0];

  let image = null;

  const save = async () => {
    await addDoc(collection(db, "posts"), {
      title,
      desc,
      price,
      color,
      inst,
      tg,
      phone,
      email,
      image
    });

    loadPosts();
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      image = e.target.result;
      save();
    };
    reader.readAsDataURL(file);
  } else {
    save();
  }
}

async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
  loadPosts();
}

/* GLOBAL */
window.enterGuest = enterGuest;
window.showAdminLogin = showAdminLogin;
window.loginAdmin = loginAdmin;
window.logout = logout;
window.addPost = addPost;
window.deletePost = deletePost;

</script>

</body>
</html>
