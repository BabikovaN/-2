<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Солодкий ринок</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #dfe9f3, #ffffff);
  color: #333;
}

.hidden { display: none; }

#authScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  background: #a8d0e6;
  color: #1f2d3d;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #8fc1d4;
}

header {
  background: #a8d0e6;
  color: #1f2d3d;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.list {
  display: flex;
  flex-direction: column;
}

.post {
  background: #fff;
  padding: 12px;
  border-radius: 14px;
  display: flex;
  gap: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.06);
}

.post img {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.side {
  width: 200px;
  background: #fff;
  padding: 12px;
  border-left: 1px solid #eee;
}

/* DARK */
body.dark {
  background: #1e2a38;
  color: #eaeaea;
}

body.dark .post {
  background: #2a3b4d;
  color: #fff;
}

body.dark header {
  background: #2f4f6f;
  color: white;
}

body.dark .auth-box {
  background: #2a3b4d;
  color: white;
}

body.dark input,
body.dark textarea,
body.dark select {
  background: #1e2a38;
  color: white;
  border: 1px solid #445;
}

body.dark button {
  background: #6fa8dc;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h3>Оберіть роль</h3>

    <button onclick="enterGuest()">👤 Гість</button>
    <button onclick="showAdminLogin()">🔐 Адмін</button>

    <div id="adminLogin" class="hidden">
      <input id="login" placeholder="Логін">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="loginAdmin()">Увійти</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  🍬 Солодкий ринок
  <div>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="toggleView()">🔘</button>
    <button onclick="logout()">Вийти</button>
  </div>
</header>

<div style="display:flex;">

<div style="flex:1; padding:15px;">

<div class="controls">
  <input id="search" placeholder="🔎 Пошук...">

  <select id="sort">
    <option value="">Сортування</option>
    <option value="asc">Ціна ↑</option>
    <option value="desc">Ціна ↓</option>
  </select>
</div>

<div id="adminPanel" class="hidden">
  <h3>Адмін панель</h3>

  <input id="title" placeholder="Назва">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input id="price" placeholder="Ціна">

  <input id="inst" placeholder="Instagram">
  <input id="tg" placeholder="Telegram">
  <input id="phone" placeholder="Телефон">
  <input id="email" placeholder="Email">

  <input type="file" id="image">

  <button onclick="addPost()">Додати</button>
</div>

<div id="posts" class="grid"></div>

</div>

<div class="side">
  <h3 id="roleTitle"></h3>
  <p id="roleInfo"></p>

  <button onclick="enterGuest()">Гість</button>
  <button onclick="showAdminLogin()">Адмін</button>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

const authScreen = document.getElementById("authScreen");
const appDiv = document.getElementById("app");
const adminPanel = document.getElementById("adminPanel");
const postsDiv = document.getElementById("posts");

let isAdmin = false;
let postsData = [];
let viewMode = "grid";

/* AUTH */
window.onload = () => {
  const role = localStorage.getItem("role");

  if (role === "admin") {
    isAdmin = true;
    startApp();
  } else if (role === "guest") {
    isAdmin = false;
    startApp();
  } else {
    authScreen.classList.remove("hidden");
  }
};

function enterGuest() {
  isAdmin = false;
  localStorage.setItem("role", "guest");
  startApp();
}

function showAdminLogin() {
  document.getElementById("adminLogin").classList.remove("hidden");
}

function loginAdmin() {
  if (login.value === "admin" && password.value === "1234") {
    isAdmin = true;
    localStorage.setItem("role", "admin");
    startApp();
  } else {
    alert("❌ Невірний логін");
  }
}

function startApp() {
  authScreen.classList.add("hidden");
  appDiv.classList.remove("hidden");

  adminPanel.classList.toggle("hidden", !isAdmin);

  document.getElementById("roleTitle").innerText = isAdmin ? "Адмін" : "Гість";
  document.getElementById("roleInfo").innerText = isAdmin ? "Повний доступ" : "Перегляд";

  loadPosts();
}

function logout() {
  localStorage.removeItem("role");
  location.reload();
}

/* LOAD */
async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  postsData = [];

  snap.forEach(d => postsData.push({ id: d.id, ...d.data() }));

  renderPosts();
}

/* RENDER */
function renderPosts() {
  let data = [...postsData];

  const searchVal = document.getElementById("search").value.toLowerCase();
  const sortVal = document.getElementById("sort").value;

  if (searchVal) {
    data = data.filter(p => p.title.toLowerCase().includes(searchVal));
  }

  if (sortVal === "asc") data.sort((a,b)=>a.price-b.price);
  if (sortVal === "desc") data.sort((a,b)=>b.price-a.price);

  postsDiv.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      ${p.image ? `<img src="${p.image}">` : ""}
      <div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <b>${p.price} грн</b>

        <div style="font-size:12px;">
          ${p.inst ? `📸 ${p.inst}<br>` : ""}
          ${p.tg ? `✈️ ${p.tg}<br>` : ""}
          ${p.phone ? `📞 ${p.phone}<br>` : ""}
          ${p.email ? `✉️ ${p.email}<br>` : ""}
        </div>

        ${isAdmin ? `
        <button onclick="editPost('${p.id}')">✏️</button>
        <button onclick="deletePost('${p.id}')">❌</button>
        ` : ""}
      </div>
    `;

    postsDiv.appendChild(div);
  });
}

/* ADD */
window.addPost = async () => {
  const file = image.files[0];
  let img = "";

  if (file) {
    const reader = new FileReader();
    reader.onload = async e => {
      img = e.target.result;

      await addDoc(collection(db,"posts"), {
        title: title.value,
        desc: desc.value,
        price: Number(price.value),
        inst: inst.value,
        tg: tg.value,
        phone: phone.value,
        email: email.value,
        image: img
      });

      loadPosts();
    };
    reader.readAsDataURL(file);
  }
};

/* DELETE */
window.deletePost = async (id) => {
  if (!confirm("Видалити?")) return;
  await deleteDoc(doc(db,"posts",id));
  loadPosts();
};

/* EDIT */
window.editPost = async (id) => {
  const p = postsData.find(x => x.id === id);

  const t = prompt("Назва", p.title);
  const d = prompt("Опис", p.desc);
  const pr = prompt("Ціна", p.price);

  if (!t) return;

  await updateDoc(doc(db,"posts",id), {
    title: t,
    desc: d,
    price: Number(pr)
  });

  loadPosts();
};

/* VIEW */
window.toggleView = () => {
  viewMode = viewMode === "grid" ? "list" : "grid";
  postsDiv.className = viewMode;
};

/* THEME */
window.toggleTheme = () => {
  document.body.classList.toggle("dark");
};

/* SEARCH / SORT */
document.getElementById("search").oninput = renderPosts;
document.getElementById("sort").onchange = renderPosts;

/* GLOBAL */
window.enterGuest = enterGuest;
window.showAdminLogin = showAdminLogin;
window.loginAdmin = loginAdmin;
window.logout = logout;

</script>

</body>
</html>
