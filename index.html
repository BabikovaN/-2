<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<style>
:root { --bg:#eaf6ff; --card:white; --text:#333; }
body.dark { --bg:#1e2a36; --card:#2a3a4a; --text:#fff; }
body { margin:0; font-family:Arial; background:var(--bg); color:var(--text); }
header { padding:10px; display:flex; justify-content:space-between; background:#9fd3ff; flex-wrap:wrap; }
.controls { padding:10px; display:flex; gap:5px; flex-wrap:wrap; }
input, select, button, textarea { padding:8px; border-radius:8px; border:none; }
.grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap:10px; padding:10px; }
.card { background:var(--card); padding:10px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.card img { width:100%; height:160px; object-fit:cover; border-radius:10px; cursor:pointer; }
#modal { position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:none; justify-content:center; align-items:center; }
#modal img { max-width:90%; max-height:90%; }
</style>
</head>

<body>

<header>
  <div>🍬 Shop</div>
  <div>
    <button id="adminBtn">🔐 Admin</button>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="logout()">🚪</button>
  </div>
</header>

<div id="loginBox" style="display:none; padding:10px;">
  <input id="login" placeholder="Логін">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="loginAdmin()">Увійти</button>
</div>

<div class="controls">
  <input id="search" placeholder="Пошук...">
</div>

<div id="adminPanel" style="display:none; padding:10px;">
  <input id="title" placeholder="Назва">
  <input id="price" placeholder="Ціна">
  <textarea id="desc" placeholder="Опис"></textarea>
  <input type="file" id="images" multiple>
  <button id="addBtn">Додати</button>
  <div id="loader">⏳ Завантаження...</div>
</div>

<div id="posts" class="grid"></div>

<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const postsRef = collection(db,"posts");

let posts = [];
let editId=null;
let isAdmin=false;

const postsDiv=document.getElementById("posts");
const loader=document.getElementById("loader");

// 🔥 realtime база
onSnapshot(postsRef,(snap)=>{
  posts = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

// admin login
document.getElementById("adminBtn").onclick=()=>{
  loginBox.style.display="block";
};

window.loginAdmin=()=>{
  if(login.value==="admin" && password.value==="1234"){
    isAdmin=true;
    adminPanel.style.display="block";
    loginBox.style.display="none";
  }
};

window.logout=()=>{
  isAdmin=false;
  adminPanel.style.display="none";
};

// add/edit
document.getElementById("addBtn").onclick = async ()=>{

  loader.style.display="block";

  const imgs=[];

  for(let f of images.files){
    const storageRef = ref(storage,`products/${Date.now()}_${f.name}`);
    await uploadBytes(storageRef,f);
    const url = await getDownloadURL(storageRef);
    imgs.push(url);
  }

  if(editId){
    await updateDoc(doc(db,"posts",editId),{
      title:title.value,
      desc:desc.value,
      price:Number(price.value)||0,
      images:imgs
    });
    editId=null;
  } else {
    await addDoc(postsRef,{
      title:title.value,
      desc:desc.value,
      price:Number(price.value)||0,
      images:imgs
    });
  }

  loader.style.display="none";

  title.value=desc.value=price.value="";
  images.value="";
};

// render
function render(){
  postsDiv.innerHTML="";
  posts.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${p.images ? `<img src="${p.images[0]}" onclick="openModal('${p.images[0]}')">` : ""}
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>

      ${isAdmin ? `
        <button onclick="deletePost('${p.id}')">🗑</button>
      ` : ""}
    `;

    postsDiv.appendChild(div);
  });
}

// delete
window.deletePost=async(id)=>{
  if(confirm("Видалити?")){
    await deleteDoc(doc(db,"posts",id));
  }
};

// modal
window.openModal=(img)=>{
  modal.style.display="flex";
  modalImg.src=img;
};

window.closeModal=()=>modal.style.display="none";

// theme
window.toggleTheme=()=>document.body.classList.toggle("dark");

</script>

</body>
</html>
